[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

markers =
    generation: Test case generation module tests
    prediction: Defect prediction module tests
    script_gen: Script generation module tests
    P0: Critical priority tests
    P1: High priority tests
    P2: Medium priority tests
    smoke: Quick smoke tests
    integration: Integration tests
