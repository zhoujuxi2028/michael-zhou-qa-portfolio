apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qa-portfolio.fullname" . }}-results-server
  labels:
    {{- include "qa-portfolio.resultsServer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qa-portfolio.resultsServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qa-portfolio.resultsServer.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: test-results
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: test-results
          persistentVolumeClaim:
            claimName: {{ include "qa-portfolio.fullname" . }}-test-results
        - name: nginx-config
          configMap:
            name: {{ include "qa-portfolio.fullname" . }}-nginx-config
