# Default values for qa-portfolio (dev environment)
# Override per environment with values-staging.yaml or values-production.yaml

nameOverride: ""
fullnameOverride: ""

# --- Results Server (nginx) ---
image:
  repository: nginx
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

# --- Cypress Job ---
cypress:
  enabled: true
  image:
    repository: cypress/included
    tag: "13.6.0"
    pullPolicy: IfNotPresent
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# --- Newman Job ---
newman:
  enabled: true
  image:
    repository: qa-newman-demo
    tag: "latest"
    pullPolicy: Never  # Locally built image for demo
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 300
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# --- Test Configuration ---
testConfig:
  # Cypress
  baseUrl: "https://jsonplaceholder.typicode.com"
  video: "true"
  screenshotOnFailure: "true"
  videoCompression: "32"
  # Newman
  newmanEnvironment: "staging"
  newmanTimeout: "10000"
  newmanDelay: "500"
  # Execution
  browser: "chrome"
  headless: "true"
  parallel: "false"
  bailOnFailure: "true"
  # Reports
  reportDir: "/test-results"
  # Logging
  logLevel: "info"
  enableDebug: "false"

# --- Newman Environment ---
newmanEnv:
  name: "JSONPlaceholder Staging"
  baseUrl: "https://jsonplaceholder.typicode.com"
  timeout: "10000"
  environment: "staging"

# --- Storage ---
storage:
  testResults:
    size: 5Gi
    accessMode: ReadWriteOnce
  cypressCache:
    size: 1Gi
    accessMode: ReadWriteOnce

# --- Service ---
service:
  type: ClusterIP
  port: 80

headlessService:
  enabled: true

# --- Ingress ---
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/custom-http-errors: "404,503"
  hosts:
    - host: test-results.qa-portfolio.local
      paths:
        - path: /
          pathType: Prefix
        - path: /cypress
          pathType: Prefix
        - path: /newman
          pathType: Prefix
    - host: localhost
      paths:
        - path: /test-results
          pathType: Prefix

# --- IngressClass ---
ingressClass:
  enabled: true
  name: nginx
  controller: k8s.io/ingress-nginx
