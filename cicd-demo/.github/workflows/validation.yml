name: Dependency & Environment Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'cicd-demo/**'
      - '.github/workflows/validation.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'cicd-demo/**'
  workflow_dispatch:

env:
  WORKING_DIR: cicd-demo

jobs:
  validate-environment:
    name: Validate Environment Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .nvmrc exists (ENV-001 prevention)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -f ".nvmrc" ]; then
            echo "❌ .nvmrc file is missing!"
            echo "This prevents ENV-001 (Node.js version mismatch)"
            exit 1
          fi
          echo "✅ .nvmrc file exists"
          required_version=$(cat .nvmrc)
          echo "Required Node.js version: $required_version"
          echo "NODE_VERSION=$required_version" >> $GITHUB_ENV

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '${{ env.WORKING_DIR }}/.nvmrc'
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: Verify Node.js version matches .nvmrc
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          required_version=$(cat .nvmrc)
          current_version=$(node --version | sed 's/v//')
          if [ "$current_version" != "$required_version" ]; then
            echo "❌ Node.js version mismatch!"
            echo "Required: $required_version"
            echo "Current: $current_version"
            exit 1
          fi
          echo "✅ Node.js version verified: v$current_version"

      - name: Check package-lock.json exists (DEP-001 prevention)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "❌ package-lock.json is missing!"
            echo "This prevents DEP-001 (non-deterministic installs)"
            exit 1
          fi
          echo "✅ package-lock.json exists"

      - name: Validate package-lock.json is in sync
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔍 Validating lock file is in sync with package.json..."
          npm ci --dry-run
          if [ $? -ne 0 ]; then
            echo "❌ package-lock.json is out of sync with package.json!"
            echo "Run 'npm install' and commit the updated lock file"
            exit 1
          fi
          echo "✅ Lock file is in sync"

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "📦 Installing dependencies with npm ci..."
          npm ci
          echo "✅ Dependencies installed successfully"

      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔍 Running ESLint..."
          npm run lint
          echo "✅ ESLint passed"

      - name: Verify Cypress installation
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔍 Verifying Cypress binary..."
          npx cypress verify
          echo "✅ Cypress verified"

      - name: Security audit (informational)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔒 Running npm audit..."
          npm audit --audit-level=high || echo "⚠️ Security vulnerabilities found (informational only)"

      - name: Validation summary
        if: success()
        run: |
          echo "## ✅ Environment Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation checks completed successfully:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .nvmrc file exists and Node.js version matches" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ package-lock.json exists and is in sync" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies installed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cypress verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Prevented Issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- ENV-001: Node.js version compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- DEP-001: Missing or out-of-sync package-lock.json" >> $GITHUB_STEP_SUMMARY

  check-file-permissions:
    name: Check File Permissions
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for root-owned files (PERM-001 prevention)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔍 Checking for permission issues..."

          # Check if any committed files are owned by root (shouldn't happen in CI)
          root_files=$(find . -user root 2>/dev/null || echo "")

          if [ -n "$root_files" ]; then
            echo "⚠️ Found root-owned files:"
            echo "$root_files"
          else
            echo "✅ No root-owned files found"
          fi

      - name: Verify scripts are executable
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🔍 Checking script permissions..."

          if [ ! -x "scripts/validate-environment.sh" ]; then
            echo "❌ scripts/validate-environment.sh is not executable!"
            exit 1
          fi

          if [ ! -x "scripts/fix-permissions.sh" ]; then
            echo "❌ scripts/fix-permissions.sh is not executable!"
            exit 1
          fi

          echo "✅ All scripts are executable"

      - name: Permission check summary
        if: success()
        run: |
          echo "## ✅ Permission Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No root-owned files detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All scripts have execute permissions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Prevented Issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- PERM-001: Permission errors from Docker-created files" >> $GITHUB_STEP_SUMMARY
