# Deployment for Test Results HTTP Server
# Serves test reports via a simple nginx web server
#
# Interview Talking Point:
# "After tests complete, we need a way to view HTML reports. This deployment
# runs a lightweight nginx server that mounts the test results volume and
# serves reports over HTTP. This is a common pattern for making CI/CD artifacts
# accessible without requiring direct cluster access."

apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-results-server
  namespace: qa-portfolio
  labels:
    app: cicd-demo
    component: results-server

spec:
  replicas: 1  # Single replica is sufficient for viewing reports

  selector:
    matchLabels:
      app: cicd-demo
      component: results-server

  template:
    metadata:
      labels:
        app: cicd-demo
        component: results-server

    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Resource limits
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Volume mounts
          volumeMounts:
            # Mount test results as web server root
            - name: test-results
              mountPath: /usr/share/nginx/html
              readOnly: true

            # Custom nginx config (optional)
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

      # Volumes
      volumes:
        # Test results from PVC
        - name: test-results
          persistentVolumeClaim:
            claimName: test-results-pvc

        # Nginx configuration
        - name: nginx-config
          configMap:
            name: nginx-config

---
# ConfigMap for nginx configuration
# Enables directory listing and proper MIME types for test reports
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: qa-portfolio
  labels:
    app: cicd-demo
    component: nginx-config

data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Root directory for test results
        root /usr/share/nginx/html;

        # Enable directory listing
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # Proper MIME types for reports
        types {
            text/html html htm;
            text/css css;
            application/javascript js;
            application/json json;
            application/xml xml;
            image/png png;
            image/jpeg jpg jpeg;
            video/mp4 mp4;
            video/webm webm;
        }

        # Serve index.html by default
        index index.html;

        # Main location block
        location / {
            try_files $uri $uri/ =404;
        }

        # CORS headers for viewing videos/images
        location ~* \.(mp4|webm|png|jpg|jpeg)$ {
            add_header Access-Control-Allow-Origin *;
        }

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
