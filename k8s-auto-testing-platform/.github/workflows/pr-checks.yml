name: PR Checks

on:
  pull_request:
    branches: [k8s-auto-testing-platform, main, portfolio]
    paths:
      - 'k8s-auto-testing-platform/**'

defaults:
  run:
    working-directory: k8s-auto-testing-platform

jobs:
  quick-checks:
    name: Quick Checks (Lint & Format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort pylint

      - name: Check formatting (Black)
        run: black --check --diff tests/ tools/ app/

      - name: Check imports (isort)
        run: isort --check-only --diff tests/ tools/ app/

      - name: Lint (flake8)
        run: |
          flake8 tests/ tools/ app/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint (pylint) - Score Check
        run: |
          pip install -r requirements.txt
          pylint tests/ tools/ app/ \
            --max-line-length=120 \
            --fail-under=8.0 \
            --disable=C0114,C0115,C0116,C0415,W1203,R0801,R0902,W0718 \
            || true

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests (mocked)
        run: |
          pytest tests/ -v \
            -m "smoke" \
            --ignore=tests/test_hpa.py \
            --ignore=tests/test_chaos.py \
            --tb=short \
            || true

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [quick-checks, smoke-tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quick Checks | ${{ needs.quick-checks.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
