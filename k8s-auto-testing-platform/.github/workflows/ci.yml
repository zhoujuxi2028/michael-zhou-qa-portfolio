name: K8S Auto Testing Platform CI

on:
  push:
    branches: [k8s-auto-testing-platform, main, portfolio]
    paths:
      - 'k8s-auto-testing-platform/**'
  pull_request:
    branches: [k8s-auto-testing-platform, main, portfolio]
    paths:
      - 'k8s-auto-testing-platform/**'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run K8S integration tests'
        required: false
        default: 'false'
        type: boolean

defaults:
  run:
    working-directory: k8s-auto-testing-platform

env:
  PYTHON_VERSION: '3.11'

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort pylint

      - name: Check code formatting with Black
        run: black --check --diff tests/ tools/ app/

      - name: Check import sorting with isort
        run: isort --check-only --diff tests/ tools/ app/

      - name: Lint with flake8 (critical errors)
        run: |
          flake8 tests/ tools/ app/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint with flake8 (all checks)
        run: |
          flake8 tests/ tools/ app/ \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics

      - name: Lint with pylint
        run: |
          pylint tests/ tools/ app/ \
            --max-line-length=120 \
            --fail-under=8.0 \
            --disable=C0114,C0115,C0116,C0415,W1203,R0801,R0902,W0718 \
            || echo "Pylint score below threshold"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=tests \
            --cov=tools \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-report=term-missing \
            --junitxml=reports/junit-results.xml \
            --html=reports/test-report.html \
            --self-contained-html \
            -m "not integration and not slow" \
            --ignore=tests/test_hpa.py \
            --ignore=tests/test_chaos.py \
            || true

      - name: Generate enhanced reports
        if: always()
        run: |
          if [ -f reports/junit-results.xml ]; then
            python tools/report_generator.py \
              --junit-xml reports/junit-results.xml \
              --output-dir reports
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: k8s-auto-testing-platform/reports/htmlcov/
          retention-days: 7

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            k8s-auto-testing-platform/reports/
          retention-days: 14

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/test-results.json ]; then
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            python -c "
import json
with open('reports/test-results.json') as f:
    data = json.load(f)
    s = data['summary']
    print(f\"| Total Tests | {s['total']} |\")
    print(f\"| Passed | {s['passed']} |\")
    print(f\"| Failed | {s['failed']} |\")
    print(f\"| Skipped | {s['skipped']} |\")
    print(f\"| Pass Rate | {s['pass_rate']}% |\")
" >> $GITHUB_STEP_SUMMARY
          fi

  k8s-integration-tests:
    name: K8S Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event.inputs.run_integration == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: k8s-testing
          wait: 300s

      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
          echo "Waiting for metrics-server..."
          sleep 30

      - name: Build and load Docker image
        run: |
          docker build -t test-app:latest ./app
          kind load docker-image test-app:latest --name k8s-testing

      - name: Deploy to K8S
        run: |
          kubectl apply -f k8s-manifests/
          kubectl wait --for=condition=available deployment/test-app -n k8s-testing --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get all -n k8s-testing
          kubectl get hpa -n k8s-testing

      - name: Run integration tests
        run: |
          pytest tests/ -v \
            --junitxml=reports/integration-results.xml \
            --html=reports/integration-report.html \
            --self-contained-html \
            -m "integration or hpa or deployment or service"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            k8s-auto-testing-platform/reports/integration-results.xml
            k8s-auto-testing-platform/reports/integration-report.html
          retention-days: 7

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '⚠️ Check Results' }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.code-quality.result }}" == "failure" ]]; then
            echo "Code quality checks failed!"
            exit 1
          fi
          echo "Build completed successfully!"
