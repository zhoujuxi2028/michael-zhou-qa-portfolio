name: K8S Auto Testing Platform CI

on:
  push:
    branches: [k8s-auto-testing-platform, main, portfolio]
    paths:
      - 'k8s-auto-testing-platform/**'
  pull_request:
    branches: [k8s-auto-testing-platform, main, portfolio]
    paths:
      - 'k8s-auto-testing-platform/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: k8s-auto-testing-platform

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Check code formatting with Black
        run: |
          black --check --diff tests/ tools/ app/

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff tests/ tools/ app/

      - name: Lint with flake8
        run: |
          flake8 tests/ tools/ app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 tests/ tools/ app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  unit-tests:
    name: Unit Tests (Mock K8S)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=tests \
            --cov=tools \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=reports/junit-results.xml \
            --html=reports/test-report.html \
            --self-contained-html \
            -m "not integration and not slow" \
            --ignore=tests/test_hpa.py \
            || true

      - name: Generate enhanced reports
        if: always()
        run: |
          python tools/report_generator.py \
            --junit-xml reports/junit-results.xml \
            --output-dir reports

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: k8s-auto-testing-platform/htmlcov/
          retention-days: 7

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            k8s-auto-testing-platform/reports/
          retention-days: 14

  k8s-integration-tests:
    name: K8S Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'k8s-auto-testing-platform/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: k8s-testing
          wait: 300s

      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
          sleep 30

      - name: Build and load Docker image
        run: |
          docker build -t test-app:latest ./app
          kind load docker-image test-app:latest --name k8s-testing

      - name: Deploy to K8S
        run: |
          kubectl apply -f k8s-manifests/
          kubectl wait --for=condition=available deployment/test-app -n k8s-testing --timeout=120s

      - name: Run integration tests
        run: |
          pytest tests/ -v \
            --junitxml=integration-test-results.xml \
            -m "integration or slow"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: k8s-auto-testing-platform/integration-test-results.xml
          retention-days: 7

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]]; then
            echo "Build failed!"
            exit 1
          fi
          echo "Build passed!"
