[pytest]
# Pytest Configuration for K8S Auto Testing Platform

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --html=reports/test-report.html
    --self-contained-html

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    hpa: HPA related tests
    deployment: Deployment related tests
    service: Service related tests
    chaos: Chaos engineering tests
    network: Network chaos tests
    slow: Tests that take a long time to run
    smoke: Quick smoke tests

# Coverage
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
