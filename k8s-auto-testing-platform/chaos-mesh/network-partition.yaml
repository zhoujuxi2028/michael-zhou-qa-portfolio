# NetworkChaos: 网络分区模拟
# 模拟 Pod 之间的网络分区
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-partition-test
  namespace: k8s-testing
  labels:
    app: chaos-test
    scenario: network-resilience
spec:
  action: partition
  mode: one
  selector:
    namespaces:
      - k8s-testing
    labelSelectors:
      app: test-app
  direction: both
  target:
    selector:
      namespaces:
        - k8s-testing
      labelSelectors:
        app: test-app
    mode: all
  duration: "60s"
