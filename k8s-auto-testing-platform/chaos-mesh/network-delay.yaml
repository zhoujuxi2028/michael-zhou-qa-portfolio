# NetworkChaos: 网络延迟注入
# 模拟网络延迟，测试服务在高延迟下的表现
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-test
  namespace: k8s-testing
  labels:
    app: chaos-test
    scenario: network-resilience
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - k8s-testing
    labelSelectors:
      app: test-app
  delay:
    latency: "100ms"
    correlation: "50"
    jitter: "20ms"
  duration: "120s"
