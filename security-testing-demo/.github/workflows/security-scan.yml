name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'security-testing-demo/**'
  pull_request:
    branches: [main]
    paths:
      - 'security-testing-demo/**'
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: false
        default: 'http://localhost'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security tests (without ZAP)
        run: |
          pytest tests/ -v \
            --ignore=tests/test_zap.py \
            -m "not zap and not slow" \
            --html=reports/test-report.html \
            --self-contained-html \
            || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-report
          path: security-testing-demo/reports/test-report.html

  zap-baseline-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 80:80

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for DVWA to start
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:80 > /dev/null; then
              echo "DVWA is ready"
              break
            fi
            echo "Waiting for DVWA..."
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:80'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html

  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Run dependency vulnerability scan
        run: |
          pip install -r requirements.txt
          safety check --json > reports/dependency-scan.json || true
          cat reports/dependency-scan.json

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-report
          path: security-testing-demo/reports/dependency-scan.json

  summary:
    needs: [security-tests, zap-baseline-scan, dependency-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Security Scan Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP Baseline | ${{ needs.zap-baseline-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
