# JMeter Load Test Configuration
# Purpose: Verify performance under expected load (aligned with k6 load.k6.js)
# Usage:   npm run jmeter:load
# Profile:  20→30 threads over 2 phases, 5min total
#
# Parameters:
#   threads_phase1 - concurrent users in phase 1 (warm-up)
#   threads_phase2 - concurrent users in phase 2 (steady)
#   duration       - total test duration in seconds
#   rampup         - seconds to ramp up each phase
#   base_url       - target server hostname
#   port           - target server port (overridable via -Jport=<port>)
threads_phase1=20
threads_phase2=30
duration=300
rampup=60
base_url=localhost
port=3000
