# JMeter Spike Test Configuration
# Purpose: Verify system handles sudden traffic bursts (aligned with k6 spike.k6.js)
# Usage:   npm run jmeter:spike
# Profile:  5→100→5→0 threads, 1.5min total
#
# Parameters:
#   threads_base  - baseline concurrent users
#   threads_spike - additional threads during spike (total = base + spike)
#   spike_rampup  - seconds to ramp up spike threads
#   duration      - total test duration in seconds
#   base_url      - target server hostname
#   port          - target server port (overridable via -Jport=<port>)
threads_base=5
threads_spike=95
spike_rampup=5
duration=90
base_url=localhost
port=3000
