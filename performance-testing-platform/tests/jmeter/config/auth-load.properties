# JMeter Auth Load Test Configuration
# Purpose: Test JWT login under concurrent load (requires AUTH_ENABLED=true)
# Usage:   npm run jmeter:auth-load
# Profile:  50 threads, 3min steady state
#
# Parameters:
#   threads  - concurrent virtual users
#   duration - test duration in seconds
#   rampup   - seconds to gradually start all threads
#   base_url - target server hostname
#   port     - target server port (overridable via -Jport=<port>)
threads=50
rampup=30
duration=180
base_url=localhost
port=3000
