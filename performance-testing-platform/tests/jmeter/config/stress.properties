# JMeter Stress Test Configuration
# Purpose: Find system limits under increasing load (aligned with k6 stress.k6.js)
# Usage:   npm run jmeter:stress
# Profile:  50→100→150→200 threads over 4 stages, 3.5min total
#
# Parameters:
#   threads_per_stage - thread increment per stage
#   stages            - number of load stages
#   duration          - total test duration in seconds
#   rampup            - seconds to ramp up each stage
#   base_url          - target server hostname
#   port              - target server port (overridable via -Jport=<port>)
threads_per_stage=50
stages=4
duration=210
rampup=30
base_url=localhost
port=3000
