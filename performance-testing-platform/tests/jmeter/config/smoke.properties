# JMeter Smoke Test Configuration
# Aligned with k6 smoke.k6.js parameters
#
# threads  - concurrent virtual users (thread count)
# duration - total test duration in seconds (must >60s for HTML report timestamp visibility)
# rampup   - seconds to gradually start all threads (avoids sudden load spike)
# base_url - target server hostname
# port     - target server port (overridable via -Jport=<port>)
threads=5
duration=60
rampup=10
base_url=localhost
port=3000
