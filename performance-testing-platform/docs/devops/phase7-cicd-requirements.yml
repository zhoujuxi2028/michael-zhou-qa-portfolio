#### PERF-K6-FR-004: 崩溃分类

**用户故事**: 作为性能工程师，我想在breakpoint报告中看到graceful/catastrophic崩溃分类，以便区分系统降级方式

**需求描述**:
```yaml
functional_requirements:
  - 在breakpoint.k6.js的handleSummary中增强崩溃分类
  - 输出崩溃类型：graceful或catastrophic
  - 基于崩溃表现自动判断分类

technical_requirements:
  classification_logic:
    graceful_criteria:
      - p95渐进增长（线性或缓慢指数）
      - error rate缓慢上升（<10%/分钟）
      - 系统响应能力保持（部分请求成功）

    catastrophic_criteria:
      - error rate突跳（<1% → >50% within 30秒）
      - p95突增（<500ms → >3000ms）
      - 系统完全无响应（100% error或超时）

    classification_output:
      summary_json_field: "crash_type"
      values: "graceful / catastrophic"
      description: "基于criteria的简要说明"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ breakpoint测试输出包含crash_type字段
  - ✅ 自动分类逻辑基于客观指标
  - ✅ graceful和catastrophic定义明确
  - ✅ 分类结果在summary报告中显示
  - ✅ classification criteria可配置化
```

#### PERF-K6-FR-005: 熔断恢复测试

**用户故事**: 作为性能工程师，我想验证系统在持续超载后的熔断恢复行为，以便评估弹性工程能力

**需求描述**:
```yaml
functional_requirements:
  - 创建k6脚本来测试熔断恢复行为
  - 模拟持续超载触发rate limiter
  - 监控熔断触发和恢复时间
  - 验证恢复后的性能是否正常

technical_requirements:
  test_script:
    file: "resilience-recovery-test.k6.js"

  test_phases:
    phase1_normal:
      - 正常负载（<limit）
      - 验证系统响应正常

    phase2_overload:
      - 持续超载（2x limit）
      - 触发rate limiter
      - 验证429响应

    phase3_recovery:
      - 恢复到正常负载
      - 验证恢复时间
      - 验证性能恢复正常
      - 验证错误率下降

  metrics_collected:
    - trigger_time: rate limiter触发时间
    - recovery_time: 性能恢复正常时间
    - recovery_duration: 恢复持续时间
    - p95_during_overload: 过载期间的p95
    - p95_after_recovery: 恢复后的p95
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ resilience恢复测试脚本实现
  - ✅ 测试覆盖3个阶段（正常/超载/恢复）
  - ✅ 熔断触发和恢复时间被记录
  - ✅ 恢复后的性能恢复正常
  - ✅ metrics包含所有关键指标
```

