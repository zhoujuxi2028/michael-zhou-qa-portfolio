### 2.3 Observability模块 (PERF-OBS-FR-001~004)

#### PERF-OBS-FR-001: 错误分布面板

**用户故事**: 作为性能工程师，我想在Grafana中查看错误分布时序图（按endpoint分组）

**需求描述**:
```yaml
functional_requirements:
  - 创建错误率时序图面板
  - 支持按endpoint分组显示
  - 支持时间范围选择
  - 显示错误率的绝对值和趋势

technical_requirements:
  grafana_panel:
    type: "Time Series"
    title: "Error Rate by Endpoint"

  influxdb_query:
    query_template: |
      from(bucket: "k6_metrics")
        |> range(start: -24h)
        |> filter(fn: (r) => r.http_req_failed == true)
        |> group(columns: ["endpoint"])
        |> aggregateWindow(every: 1m, fn: mean, createColumn: "error_rate", as: "rate() * 100")

  visual_config:
    y-axis: "Error Rate (%)"
    x-axis: "Time"
    legend: "按endpoint分组"
    color_scheme: "基于endpoint的自动着色"

  alerts:
    threshold: "error_rate > 1%"
    condition: "5m内持续超过1%"
    notification: "POST到webhook"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ Grafana中存在错误分布面板
  - ✅ 支持endpoint分组筛选
  - ✅ 显示错误率时序图
  - ✅ 包含阈值线（1%）
  - ✅ 面板可以交互调整时间范围
```

#### PERF-OBS-FR-002: 延迟热力图

**用户故事**: 作为性能工程师，我想在Grafana中查看请求延迟分布的heatmap可视化

**需求描述**:
```yaml
functional_requirements:
  - 创建延迟分布heatmap面板
  - X轴为时间，Y轴为endpoint
  - 颜色梯度表示延迟大小
  - 支持时间范围和聚合窗口选择

technical_requirements:
  grafana_panel:
    type: "Heatmap"
    title: "Latency Heatmap"

  influxdb_query:
    query_template: |
      from(bucket: "k6_metrics")
        |> range(start: -1h)
        |> filter(fn: (r) => r.http_req_duration <= 5000)
        |> aggregateWindow(every: 1m, fn: mean, columns: ["endpoint", "value"])

  heatmap_config:
    x_axis: "Time (1分钟聚合点)"
    y_axis: "Endpoint"
    color_scheme: "绿(快)→黄(中)→红(慢)"
    color_scale:
      min: 0ms, max: 5000ms

  data_exclusion:
    - 过滤异常高延迟值（>5秒）
    - 过滤无效endpoint名称
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ Grafana中存在延迟热力图
  - ✅ 正确显示时间序列的延迟分布
  - ✅ Y轴显示endpoint列表
  - ✅ 颜色梯度正确反映延迟大小
  - ✅ 支持时间范围调整
```

#### PERF-OBS-FR-003: 自定义指标聚合

**用户故事**: 作为性能工程师，我想在Grafana中查看自定义指标面板（soak_heap_used_mb、soak_event_loop_lag、soak_order_success）

**需求描述**:
```yaml
functional_requirements:
  - 创建自定义指标聚合面板
  - 支持多个时序图在一个面板中
  - 每个指标独立的Y轴和图例
  - 显示最近数据点的趋势

technical_requirements:
  grafana_panel:
    type: "Time Series (Multi)"
    title: "Custom Metrics"

  influxdb_queries:
    metrics:
      - query_heap: |
          from(bucket: "k6_metrics")
          |> range(start: -24h)
          |> filter(fn: (r) => r.metric_name == "soak_heap_used_mb")
          |> aggregateWindow(every: 30s, fn: mean)

      - query_event_loop: |
          from(bucket: "k6_metrics")
          |> range(start: -24h)
          |> filter(fn: (r) => r.metric_name == "soak_event_loop_lag")
          |> aggregateWindow(every: 30s, fn: max)

      - query_order_success: |
          from(bucket: "k6_metrics")
          |> range(start: -24h)
          |> filter(fn: (r) => r.metric_name == "soak_order_success_rate")
          |> aggregateWindow(every: 30s, fn: mean)

  visual_config:
    - 每个指标独立的时间序列图
    - Y轴范围自适应
    - 图例显示指标名称和当前值
    - 显示阈值线（如heap > 100MB）
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ Grafana中存在自定义指标面板
  - ✅ 显示3个独立的时间序列图
  - ✅ 每个指标有独立的Y轴和图例
  - ✅ 数据正确从InfluxDB查询
  - ✅ 支持时间范围调整
```

#### PERF-OBS-FR-004: Grafana webhook告警

**用户故事**: 作为性能工程师，我想在Grafana中配置webhook，告警触发时POST到指定URL

**需求描述**:
```yaml
functional_requirements:
  - 在Grafana中配置alert webhook
  - 告警触发时POST JSON到指定URL
  - 支持多个alert类型（阈值触发、异常检测）
  - 告警payload包含详细的信息

technical_requirements:
  grafana_config:
    alert_notification:
      type: "webhook"
      url: "${ALERT_WEBHOOK_URL}" (从环境变量)
      method: "POST"
      content_type: "application/json"

  webhook_payload:
    alert_name: "Grafana alert名称"
    state: "firing / resolved"
    condition: "告警触发条件"
    values: "当前指标值"
    message: "告警描述"
    timestamp: "告警时间"
    labels:
      - "alert_type: threshold / anomaly"
      - "endpoint: affected endpoint"
      - "severity: warning / critical"

  security_considerations:
    - Webhook URL需要验证合法性
    - 使用HTTPS端点
    - 实现请求签名验证（可选）
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ Grafana中配置webhook通知
  - ✅ 告警触发时成功POST到指定URL
  - ✅ payload包含所有必需字段
  - ✅ 支持firing和resolved状态
  - ✅ 告警信息格式符合要求
  - ✅ 包含labels用于分类和路由
```

