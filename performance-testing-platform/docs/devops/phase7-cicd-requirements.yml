# Phase 7 DevOps需求文档 - CI/CD Pipeline Implementation

**需求来源**: Issue #88
**设计文档**: docs/devops/phase7-cicd-architecture.yml
**创建日期**: 2026-04-18

---

## 1. 需求概述

### 1.1 目标

将测试结果接入 CI/CD 流水线和可观测性平台，实现：
1. **性能基线回归检测** - 自动对比当前与历史性能
2. **覆盖率门禁系统** - 强制执行，防止覆盖率退化
3. **Grafana面板增强** - 错误分布、延迟热力图、自定义指标
4. **定时调度系统** - nightly soak 和 weekly capacity 自动执行
5. **趋势分析** - 多次运行数据的可视化
6. **PR评论集成** - 自动在PR中显示测试结果

### 1.2 需求结构

| 模块 | 需求ID | 优先级 | 预估工作量 |
|------|----------|----------|------------|
| Baseline | PERF-BL-FR-001~006 | P1 | 12小时 |
| Coverage | PERF-COV-FR-001~003 | P1 | 6小时 |
| Observability | PERF-OBS-FR-001~004 | P2 | 8小时 |
| Schedule | PERF-SCHED-FR-001~002 | P3 | 10小时 |
| k6 Scripts | PERF-K6-FR-001~007 | P2 | 8小时 |

---

## 2. 详细需求

### 2.1 Baseline模块 (PERF-BL-FR-001~006)

#### PERF-BL-FR-001: CI性能基线存储

**用户故事**: 作为性能工程师，我想在CI中自动对比当前p95与历史基线

**需求描述**:
```yaml
functional_requirements:
  - smoke_gate执行后自动生成baseline
  - 将p95/error_rate/throughput保存为JSON artifact
  - artifact命名规范：baseline-{timestamp}.json

technical_requirements:
  artifact_data_structure:
    name: "baseline-{YYYYMMDD-HHMMSS}.json"
    format:
      timestamp: "ISO 8601 string"
      metrics:
        p95:
          value: "number (ms)"
          metric_name: "http_req_duration.p(95)"
        error_rate:
          value: "number (percentage)"
          metric_name: "http_req_failed"
        throughput:
          value: "number (req/s)"
          metric_name: "http_reqs"

  artifact_upload:
    tool: "GitHub Actions actions/upload-artifact@v7"
    retention: "90 days"
    compression: "gzip for artifacts > 10MB"

implementation_details:
  data_extraction:
    - 从k6 JSON output中提取metrics
    - 使用jq解析关键指标
    - 计算p95百分位数
    - 计算error_rate = failed/total * 100

  storage_strategy:
    - 每次CI运行覆盖前次baseline
    - 保留最近3个baseline版本
    - 90天后自动清理旧baseline
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ smoke test成功后自动生成baseline artifact
  - ✅ baseline.json包含所有必需字段
  - ✅ artifact成功上传到GitHub
  - ✅ 旧baseline按90天策略自动清理
  - ✅ 首次运行没有baseline时创建初始baseline
```

#### PERF-BL-FR-002: 基线回归检测

**用户故事**: 作为性能工程师，我想在CI中下载上次baseline artifact，对比当前p95，退化>20%则warning，>50%则fail

**需求描述**:
```yaml
functional_requirements:
  - CI下载上次成功的baseline artifact
  - 对比当前指标与baseline
  - 基于阈值判断：warning (20%) / fail (50%)
  - 在CI log中输出详细的对比结果

technical_requirements:
  baseline_download:
    - GitHub API endpoint: /repos/{owner}/{repo}/actions/artifacts
    - artifact name pattern: baseline-{timestamp}.json
    - 下载失败时的fallback: 使用默认baseline

  comparison_algorithm:
    degradation_calculation:
      formula: "(current_p95 - baseline_p95) / baseline_p95 * 100"
      positive_value: "性能提升 (improvement)"
      negative_value: "性能退化 (degradation)"

    threshold_logic:
      warning_threshold: "20%退化"
      fail_threshold: "50%退化"
      tolerance: "绝对值差异 ±50ms内不算退化"

  multi_metric_comparison:
    metrics:
      - p95: 主要对比指标
      - error_rate: 辅助对比指标
      - throughput: 辅助对比指标
    rule: "任一指标超过fail_threshold则整体fail"

  output_format:
    ci_log_output:
      format: "Console + GitHub Actions annotation"
      content:
        - current_values: 所有指标的当前值
        - baseline_values: 所有指标的基线值
        - percentage_diff: 百分比差异
        - status: PASS / WARNING / FAIL
        - details: 具体差异说明
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ 成功下载上次baseline artifact
  - ✅ 正确计算所有指标的退化百分比
  - ✅ 基于阈值设置正确的status
  - ✅ 退化≤20%时CI继续
  - ✅ 退化>50%时CI失败
  - ✅ CI log中输出清晰的对比结果
  - ✅ baseline不存在时创建新baseline并continue
```

#### PERF-BL-FR-003: 趋势数据收集

**用户故事**: 作为性能工程师，我想每次CI运行提取p95/throughput/error rate追加到reports/trend.json

**需求描述**:
```yaml
functional_requirements:
  - 每次CI运行自动收集性能指标
  - 追加式写入trend.json文件
  - 维护最近90天的历史数据
  - 自动清理90天前的旧数据

technical_requirements:
  trend_data_structure:
    file_path: "reports/trend.json"
    format:
      array:
        - timestamp: "ISO 8601"
        - metrics:
          p95: "number"
          error_rate: "number"
          throughput: "number"
          test_type: "string (smoke/load/stress/soak/capacity)"

  data_collection:
    source: "从k6 JSON output或JMeter JTL文件"
    tool: "jq for JSON parsing"
    extraction_method: "p95百分位数、计数、平均值计算"

  retention_policy:
    max_age_days: "90 days"
    cleanup_strategy: "remove entries older than 90 days"
    min_entries: "keep at least 30 data points for trend analysis"

  file_operations:
    write_mode: "append to existing array (jq --argjson '. += $new_entry')"
    atomic_operation: "使用临时文件+重命名确保数据完整性"
    backup_before_cleanup: "cleanup前创建backup"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ 每次CI运行后trend.json新增一条记录
  - ✅ 记录包含timestamp和所有必需的metrics
  - ✅ 90天前的旧数据自动删除
  - ✅ 文件格式有效的JSON数组
  - ✅ 保留至少最近30条记录用于趋势分析
```

#### PERF-BL-FR-004: 趋势可视化

**用户故事**: 作为性能工程师，我想在Grafana中查看历史p95/throughput折线图（从InfluxDB聚合）

**需求描述**:
```yaml
functional_requirements:
  - 在Grafana中创建历史趋势面板
  - 支持按测试类型筛选（smoke/load/stress/soak/capacity）
  - 显示最近N次运行的p95趋势线
  - 支持时间范围选择（7天/30天/90天）

technical_requirements:
  grafana_panel_config:
    panel_type: "Time Series"
    data_source: "InfluxDB"
    query_language: "Flux"

  flux_query_template:
    basic: |
      from(bucket: "k6_metrics")
        |> range(start: -30d)
        |> filter(fn: (r) => r.test_type == "${test_type}")
        |> aggregateWindow(every: 1d, fn: mean, column: "http_req_duration.p(95)")

    variable_support:
      - test_type: "${test_type}" (dropdown: all/smoke/load/stress/soak/capacity)
      - time_range: "${time_range}" (dropdown: 7d/30d/90d)

  visualization_config:
    y-axis: "Latency (ms)"
    x-axis: "Time"
    legend: "Current vs Baseline"
    threshold_lines:
      - p95_baseline: "基线p95参考线"
      - regression_threshold: "warn if 20% above baseline"

  performance_optimization:
    query_cache: "Redis TTL 60s for frequent queries"
    data_downsampling: "对90天以上的数据使用1小时聚合点"
    lazy_loading: "面板按需加载，不自动刷新"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ Grafana中存在历史趋势面板
  - ✅ 支持测试类型筛选
  - ✅ 显示p95时间序列图
  - ✅ 包含基线参考线
  - ✅ 查询性能优化（缓存+聚合）
  - ✅ 面板可以交互选择时间范围
```

#### PERF-BL-FR-005: Grafana趋势表

**用户故事**: 作为性能工程师，我想在Grafana中查看最近N次运行的指标对比表格（Markdown格式）

**需求描述**:
```yaml
functional_requirements:
  - 生成Markdown格式的趋势对比表
  - 对比最近N次运行的关键指标
  - 按测试类型分组显示
  - 包含趋势指示符（↑↓=）

technical_requirements:
  table_generation:
    format: "Markdown table"
    columns:
      - "Run #"
      - "Timestamp"
      - "Type"
      - "p95 (ms)"
      - "Error Rate (%)"
      - "Throughput (req/s)"
      - "Trend vs Previous"
      - "Status"

  trend_indicators:
    improvement: "↑" (绿色)
    degradation_small: "↓" (黄色, <20%)
    degradation_large: "↓⚠️" (橙色, ≥20% but <50%)
    regression: "↓🔴" (红色, ≥50%)

  comparison_logic:
    - 与上一次运行对比（显示"Trend vs Previous"列）
    - 与基线对比（如果有）
    - 计算百分比差异
    - 根据阈值设置Status和趋势指示符
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ 趋势表生成在Grafana中显示
  - ✅ 表格包含所有必需列
  - ✅ 趋势指示符正确反映性能变化
  - ✅ 支持按测试类型分组
  - ✅ Markdown格式正确渲染
```

#### PERF-BL-FR-006: 基线对比单元测试

**用户故事**: 作为QA工程师，我想验证基线对比逻辑的正确性（阈值判定、首次运行兜底、异常值处理）

**需求描述**:
```yaml
functional_requirements:
  - 验证退化>20%时返回warning
  - 验证退化>50%时返回fail
  - 验证首次运行无baseline时创建baseline而不fail
  - 验证baseline JSON格式异常时的错误处理

technical_requirements:
  test_framework: "Jest unit tests"
  test_file: "tests/unit/scripts/baseline-comparator.test.js"

  test_cases:
    UT-BL-01: "当前p95与baseline偏差<20% → PASS"
    UT-BL-02: "当前p95与baseline偏差>20% → warning"
    UT-BL-03: "当前p95与baseline偏差>50% → FAIL"
    UT-BL-04: "首次运行无baseline → 创建baseline并PASS"
    UT-BL-05: "baseline JSON格式异常 → 报错并兜底"
    UT-BL-06: "trend.json追加逻辑 → 验证新行添加"

  edge_cases:
    - baseline值为0或负数
    - p95无穷大值处理
    - 除零保护（防止除以0错误）
    - 百分比计算精度处理
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ 6个单元测试全部通过
  - ✅ 测试覆盖所有edge case
  - ✅ 退化计算逻辑准确
  - ✅ 首次运行兜底逻辑正确
  - ✅ 异常值处理优雅（不crash）
```

