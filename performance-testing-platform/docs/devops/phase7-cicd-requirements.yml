### 2.4 Schedule模块 (PERF-SCHED-FR-001~002)

#### PERF-SCHED-FR-001: GitHub Actions cron workflow

**用户故事**: 作为性能工程师，我想设置定时调度自动运行nightly soak和weekly capacity test，以便持续监控系统稳定性

**需求描述**:
```yaml
functional_requirements:
  - 在GitHub Actions中创建cron workflow
  - nightly运行10分钟soak test
  - weekly运行capacity test
  - 自动归档测试结果为artifact
  - 设置90天artifact retention

technical_requirements:
  github_actions_schedule:
    cron_expression:
      nightly_soak: "0 2 * * *" (每天UTC 2:00)
      weekly_capacity: "0 3 * * 0" (每周日UTC 3:00)
      timezone: "UTC"

  workflow_trigger:
    - schedule: "cron定时触发"
    - manual: "workflow_dispatch (手动触发)"
    - pr触发: "pull_request时运行quick smoke test"

  job_config:
    name: "scheduled-performance-tests"
    runs_on: "ubuntu-latest"
    timeout: "60 minutes"
    concurrency: "避免同时运行多个scheduled job"

  execution_steps:
    - 环境准备：npm install
    - 服务启动：npm start (if needed)
    - 健康检查：wait for /health
    - 测试执行：运行k6脚本
    - 结果收集：capture JSON output
    - artifact上传：upload test results
    - 服务清理：npm stop

  artifact_config:
    name_pattern: "scheduled-{timestamp}"
    retention: "90 days"
    includes:
      - k6 JSON output
      - HTML summary report
      - execution logs
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ GitHub Actions中存在cron workflow
  - ✅ nightly soak每天2:00 UTC触发
  - ✅ weekly capacity每周日3:00 UTC触发
  - ✅ 测试结果自动上传为artifact
  - ✅ artifact retention设置为90天
  - ✅ 支持手动触发
  - ✅ 并发控制防止重复执行
```

**可行性风险缓解**:
```yaml
risk_mitigation:
  risk: "Portfolio无持久服务器，cron在GitHub Actions runner执行"
  probability: "medium"
  impact: "medium"
  mitigation:
    - "降级为示范性workflow"
    - "文档说明这是示范性实现"
    - "提供手动验证方法"
    - "监控workflow执行状态"
```

#### PERF-SCHED-FR-002: 测试结果自动归档

**用户故事**: 作为性能工程师，我想每次调度运行的k6 JSON output存为CI artifact，保留30天

**需求描述**:
```yaml
functional_requirements:
  - 每次scheduled test后自动上传artifact
  - artifact包含k6 JSON output
  - 设置30天retention（短于其他artifact）
  - 提供artifact下载链接在workflow run summary

technical_requirements:
  artifact_management:
    tool: "GitHub Actions actions/upload-artifact@v7"

  artifact_structure:
    name: "scheduled-{YYYYMMDD-HHMMSS}"
    contents:
      - k6_results: "所有k6脚本的JSON output"
      - summary: "执行摘要"
      - metadata: "执行时间、配置等"

  retention_policy:
    scheduled_tests: "30 days (短于baseline/coverage的90天)"
    reason: "scheduled tests数量多，节省存储空间"
    cleanup: "30天后自动删除"

  download_integration:
    - 在workflow summary中提供artifact链接
    - GitHub Actions UI中可查看和下载
    - 支持按日期筛选artifact
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ scheduled test结果自动上传为artifact
  - ✅ artifact命名包含timestamp
  - ✅ retention设置为30天
  - ✅ artifact包含k6 JSON output
  - ✅ workflow summary提供下载链接
  - ✅ 30天后自动清理
```

