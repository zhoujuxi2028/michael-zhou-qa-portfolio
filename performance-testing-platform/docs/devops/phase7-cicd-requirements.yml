### 2.2 Coverage模块 (PERF-COV-FR-001~003)

#### PERF-COV-FR-001: CI覆盖率报告生成

**用户故事**: 作为性能工程师，我想在CI中强制覆盖率门禁，以便防止测试覆盖率退化

**需求描述**:
```yaml
functional_requirements:
  - unit-test job生成覆盖率报告
  - 支持多种覆盖率报告格式（lcov、JSON、HTML）
  - 报告包含详细的覆盖率数据（statements/branches/functions/lines）

technical_requirements:
  coverage_tool: "Jest内置coverage"

  report_formats:
    lcov: "行级覆盖率数据"
    json_summary: "覆盖率概要JSON"
    html_report: "可视化HTML报告"

  output_directory:
    path: "coverage/"
    artifacts:
      - lcov-report: "coverage/lcov-report/"
      - coverage-summary: "coverage/coverage-summary.json"
      - html-report: "coverage/lcov-report/index.html"

  execution:
    command: "npm test -- --coverage --coverageReporters=text --coverageReporters=lcov"
    output_capture: "Jest自动生成覆盖率数据"
    exit_code: "coverage低于阈值时exit 1"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ unit-test job成功生成coverage/目录
  - ✅ 包含lcov.info文件
  - ✅ 包含HTML可视化报告
  - ✅ 控制台输出显示覆盖率百分比
  - ✅ 所有覆盖率类型都有数据
```

#### PERF-COV-FR-002: Coverage artifact上传

**用户故事**: 作为性能工程师，我想将覆盖率报告上传为CI artifact，以便长期归档

**需求描述**:
```yaml
functional_requirements:
  - 将覆盖率报告上传为GitHub Actions artifact
  - 支持多artifact上传（lcov、HTML、JSON summary）
  - 设置artifact retention为90天

technical_requirements:
  upload_tool: "GitHub Actions actions/upload-artifact@v7"

  artifact_config:
    name: "coverage-report"
    path: "coverage/"
    retention_days: 90
    compression: "自动压缩large artifacts"
    if_no_artifacts: "不报错，仅warning"
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ 覆盖率artifact成功上传
  - ✅ artifact在GitHub Actions页面可见
  - ✅ retention策略设置为90天
  - ✅ artifact包含所有必需的覆盖率文件
  - ✅ 上传失败时有适当的错误处理
```

#### PERF-COV-FR-003: CI覆盖率阈值强制

**用户故事**: 作为性能工程师，我想在CI中强制执行覆盖率阈值，低于阈值则fail

**需求描述**:
```yaml
functional_requirements:
  - Jest coverage thresholds配置为fail-fast
  - thresholds: statements ≥80%, branches ≥70%, functions ≥80%, lines ≥80%
  - 任一指标低于阈值则CI job失败
  - 详细的错误信息指示哪个指标未达标

technical_requirements:
  threshold_configuration:
    location: "jest.config.js"
    config_section: "coverageThresholds"
    thresholds:
      global:
        statements: 80
        branches: 70
        functions: 80
        lines: 80

  enforcement_strategy:
    mode: "fail-fast (立即失败)"
    output_format:
      - 列出每个指标的当前值
      - 列出阈值要求
      - 列出差值（多少个百分点）
      - 清晰的错误消息

  validation:
    - 运行已知高覆盖率代码验证threshold生效
    - 运行已知低覆盖率代码验证fail逻辑正确
```

**验收标准**:
```yaml
acceptance_criteria:
  - ✅ jest.config.js包含coverageThresholds配置
  - ✅ 所有4个指标阈值定义正确
  - ✅ statements<80%时CI失败
  - ✅ branches<70%时CI失败
  - ✅ functions<80%时CI失败
  - ✅ lines<80%时CI失败
  - ✅ 错误消息清晰指示具体哪个指标未达标
```

