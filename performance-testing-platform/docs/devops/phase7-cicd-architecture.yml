    permissions:
      write_access:
        - ci_cd_processes: "github_actions"
        - local_development: "node_user"
      read_access:
        - analysis_scripts: "any_user"

    cleanup_policy:
      max_age_days: 90
      compression: "gzip_for_archived"
      space_limit_alert: "warn_at_80%_usage"

  backup_system:
    strategy: "daily_incremental"
    location: "reports/backups/"
