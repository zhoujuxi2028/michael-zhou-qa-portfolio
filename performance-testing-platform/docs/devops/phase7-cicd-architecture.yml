## 3. 自动化流程设计

### 3.1 定时调度自动化

```yaml
scheduled_automation:
  triggers:
    cron_schedules:
      - nightly_soak:
          cron_expression: "0 2 * * *"
          timezone: "UTC"
          description: "Every night at 2 AM UTC"
          scripts:
            - soak-short.k6.js
            duration: "10_minutes"

      - weekly_capacity:
          cron_expression: "0 3 * * 0"
          timezone: "UTC"
          description: "Every Sunday at 3 AM UTC"
          scripts:
            - capacity.k6.js
            - duration: "30_minutes"

    pull_request_triggers:
      - on_pr_create:
          condition: "target_branch = 'main'"
          action: "run_smoke_test + post_pr_comment"

      - on_pr_update:
          condition: "new_commits"
          action: "run_smoke_test + update_pr_comment"

    manual_triggers:
      - workflow_dispatch:
          inputs:
            test_type: "smoke|load|stress|capacity|soak"
            dry_run: "boolean"

  execution_sequence:
    preflight_checks:
      - docker_daemon_running: "systemctl docker status"
      - available_memory: "check_free_memory > 2GB"
      - disk_space: "check_available_space > 10GB"
      - network_connectivity: "ping google.com"
      - port_availability: "check_ports 3000, 3010, 8086"

    test_execution:
      - environment_setup:
          step: "npm start"
          health_check: "wait_for_http_200_on_health_endpoint"

      - test_run:
          step: "execute_k6_or_jmeter"
          output_capture: "redirect_to_json_or_jtl"

      - data_collection:
          step: "extract_metrics_from_output"
          storage: "save_to_reports_directory"

    post_processing:
      - analysis:
          step: "compare_with_baseline"
          step: "calculate_regression"
          step: "update_trends"

      - notification:
          step: "send_email_summary"
          step: "post_slack_notification"
          step: "update_pr_comment_if_applicable"

    cleanup:
      - stop_services:
          step: "npm stop"
          step: "docker_compose_down"

      - data_cleanup:
          step: "remove_files_older_than_90_days"
          step: "compress_archived_results"
```

### 3.2 CI工作流自动化

```yaml
ci_workflow_automation:
  workflow_phases:
    phase1_code_quality:
      jobs:
        - lint:
            tool: "ESLint"
            scope: "src/ tests/unit/ tests/integration/ scripts/"
            fail_strategy: "fast_fail"
        - format_check:
            tool: "Prettier"
            scope: "src/**/*.js tests/**/*.js scripts/**/*.js"
            fail_strategy: "fast_fail"
            note: "ISS-015: Prettier 必须与 ESLint 独立执行，两者通过标准不同"

    phase2_testing:
      jobs:
        - unit_test:
            parallel: true
            coverage_enforcement: "strict_thresholds"
            artifact_upload: "coverage_reports"

        - smoke_test:
            parallel_branches: true
            timeout: "10_minutes"
            baseline_collection: "automatic"
            trend_update: "automatic"

        - integration_tests:
            sequential: true
            dependency: "unit_test_pass"
            test_categories:
              - "integration_api_tests"
              - "integration_db_tests"
              - "integration_ui_tests"

    phase3_analysis:
      jobs:
        - baseline_comparison:
            input: "current + previous_baseline"
            comparison_logic: "percentage_diff > threshold"
            outputs: "pass|warning|fail + details"

        - trend_analysis:
            input: "historical_trend_data"
            analysis_type: "moving_average + regression_detection"
            outputs: "trend_indicators + predictions"

        - report_generation:
            format: "markdown_tables + html_charts"
            includes:
              - "test_summary"
              - "coverage_badges"
              - "performance_comparison"
              - "trend_visualization"

    phase4_notification:
      jobs:
        - pr_comment:
            trigger: "pull_request"
            content: "formatted_test_summary"
            updates: "edit_existing_comment_if_found"

        - scheduled_notification:
            trigger: "cron_job_completion"
            channels: "email + slack"
            content: "nightly_test_report"

        - alert_notification:
            trigger: "threshold_violation"
            conditions:
              - "coverage_below_threshold"
              - "performance_regression_detected"
              - "ci_pipeline_failure"
            escalation: "team_channel + project_lead"

  # ISS-015 RCA 新增: 本地质量门禁层
  local_quality_gates:
    pre_commit_hook:
      tool: "husky v9 + lint-staged"
      location: ".husky/pre-commit"
      checks:
        - eslint: "staged JS files in performance-testing-platform/"
        - prettier: "staged JS files in performance-testing-platform/"
        - ruff: "staged Python files (*.py)"
        - postman_validate: "api-testing-demo collections"
      note: "从源头防止格式不一致的代码进入仓库"

    commit_msg_hook:
      tool: "husky v9"
      location: ".husky/commit-msg"
      pattern: "^(feat|fix|docs|style|refactor|test|chore|ci|perf)(\\(.+\\))?!?: .+"

    lint_staged_config:
      location: "performance-testing-platform/package.json"
      rules:
        "src/**/*.js": ["eslint --fix", "prettier --write"]
        "tests/**/*.js": ["eslint --fix", "prettier --write"]
        "scripts/**/*.js": ["eslint --fix", "prettier --write"]

  # ISS-015 RCA 新增: 分支保护建议
  branch_protection:
    recommendation: "启用 branch protection rules，要求 CI status checks 通过后才能合并"
    target_branches: ["main", "feature/performance-testing"]
    required_settings:
      require_status_checks: true
      required_checks: ["lint", "unit-test"]
      require_branches_up_to_date: true
      dismiss_stale_reviews: true
    note: "需要 repo admin 在 GitHub Settings > Branches > Branch protection rules 手动配置"
    reference: "ISS-015 — PR #152 在 CI 未通过的情况下被合并，导致格式检查失败"
```

