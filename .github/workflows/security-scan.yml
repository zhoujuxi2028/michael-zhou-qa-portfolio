name: Security Scanning

# Trigger Configuration:
# This workflow is triggered by:
# 1. Push to any branch (immediate security feedback)
# 2. Pull requests (security gate before merge)
# 3. Scheduled daily scans (detect new vulnerabilities)
# 4. Manual trigger via GitHub UI
#
# Interview Talking Point:
# "Security scanning is integrated into our CI/CD pipeline to shift security left.
# We scan on every push and PR to catch vulnerabilities early, before they reach
# production. Daily scheduled scans detect newly disclosed vulnerabilities (CVEs)
# in our dependencies and container images."

on:
  push:
    branches: [main]
    paths:
      - 'cicd-demo/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cicd-demo/**'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

# Set permissions for security scanning
permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results
  actions: read

jobs:
  # Job 1: npm audit - Dependency vulnerability scanning
  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cicd-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Interview Talking Point:
      # "We cache node_modules to speed up CI. The cache key includes package-lock.json
      # hash, so the cache invalidates when dependencies change. This reduces install
      # time from ~2 minutes to ~30 seconds on cache hits."
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cicd-demo/package-lock.json'

      - name: Install dependencies
        run: npm ci

      # Interview Talking Point:
      # "npm audit checks our dependencies against the npm security advisory database.
      # We audit production dependencies (--omit=dev) since dev dependencies don't
      # ship to production. The --audit-level=moderate flag fails CI on moderate or
      # higher severity vulnerabilities."
      - name: Run npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (all dependencies with JSON output)
        run: npm audit --json > npm-audit.json || true

      - name: Generate npm audit report
        run: |
          echo "## NPM Audit Report" > npm-audit-report.md
          echo "" >> npm-audit-report.md
          echo "### Summary" >> npm-audit-report.md
          npm audit || echo "Vulnerabilities detected"
          echo "" >> npm-audit-report.md
          echo "### Detailed Report" >> npm-audit-report.md
          cat npm-audit.json >> npm-audit-report.md

      # Interview Talking Point:
      # "We upload audit results as artifacts for audit trails and compliance.
      # Security teams can review historical scans, track remediation progress,
      # and demonstrate due diligence to auditors."
      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: |
            cicd-demo/npm-audit.json
            cicd-demo/npm-audit-report.md
          retention-days: 30

  # Job 2: Trivy filesystem scan - Source code and dependency scanning
  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Interview Talking Point:
      # "Trivy is an open-source vulnerability scanner from Aqua Security. It scans
      # filesystems, container images, IaC configs, and more. We use it because it's
      # fast, comprehensive, and integrates seamlessly with GitHub Security tab via
      # SARIF format."
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'cicd-demo'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail on vulnerabilities (report only)

      # Convert JSON to SARIF for GitHub Security tab
      - name: Convert to SARIF format
        run: trivy convert --format sarif --output trivy-fs-results.sarif trivy-fs-results.json

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      # Convert JSON to table for human-readable artifact
      - name: Convert to table format
        run: trivy convert --format table --output trivy-fs-report.txt trivy-fs-results.json

      - name: Upload Trivy filesystem results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-results
          path: |
            trivy-fs-results.sarif
            trivy-fs-report.txt
          retention-days: 30

  # Job 3: Trivy Docker image scan - Container vulnerability scanning
  trivy-docker:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        # Scan both custom Docker images
        image:
          - name: newman
            dockerfile: Dockerfile.newman
            tag: qa-newman-demo:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Interview Talking Point:
      # "We build images in CI before scanning to ensure we're scanning the exact
      # image that would be deployed. The --load flag loads the image into Docker
      # daemon for scanning, rather than just building to cache."
      - name: Build Docker image (${{ matrix.image.name }})
        working-directory: cicd-demo
        run: |
          docker build \
            -t ${{ matrix.image.tag }} \
            -f ${{ matrix.image.dockerfile }} \
            --load \
            .

      # Interview Talking Point:
      # "Trivy scans both OS packages and application dependencies in the image.
      # For Node.js images, it analyzes package-lock.json. This catches vulnerabilities
      # in base images (e.g., Alpine Linux) and our application dependencies."
      - name: Run Trivy vulnerability scanner (Docker image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ matrix.image.tag }}
          format: 'json'
          output: 'trivy-docker-${{ matrix.image.name }}-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Convert to SARIF format
        run: trivy convert --format sarif --output trivy-docker-${{ matrix.image.name }}-results.sarif trivy-docker-${{ matrix.image.name }}-results.json

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-docker-${{ matrix.image.name }}-results.sarif'
          category: 'trivy-docker-${{ matrix.image.name }}'

      - name: Convert to table format
        run: trivy convert --format table --output trivy-docker-${{ matrix.image.name }}-report.txt trivy-docker-${{ matrix.image.name }}-results.json

      - name: Upload Trivy Docker image results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-docker-${{ matrix.image.name }}-results
          path: |
            trivy-docker-${{ matrix.image.name }}-results.sarif
            trivy-docker-${{ matrix.image.name }}-report.txt
          retention-days: 30

  # Job 4: Trivy IaC scan - Infrastructure as Code security
  trivy-iac:
    name: Trivy IaC Scan (Terraform & K8s)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Interview Talking Point:
      # "Trivy can scan Infrastructure as Code (Terraform, K8s manifests, Dockerfiles)
      # for misconfigurations and security issues. This includes insecure defaults,
      # missing security controls, and compliance violations (CIS benchmarks)."
      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'cicd-demo'
          format: 'json'
          output: 'trivy-iac-results.json'
          exit-code: '0'

      - name: Convert to SARIF format
        run: trivy convert --format sarif --output trivy-iac-results.sarif trivy-iac-results.json

      - name: Upload Trivy IaC results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-iac-results.sarif'
          category: 'trivy-iac'

      - name: Convert to table format
        run: trivy convert --format table --output trivy-iac-report.txt trivy-iac-results.json

      - name: Upload Trivy IaC results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-iac-results
          path: |
            trivy-iac-results.sarif
            trivy-iac-report.txt
          retention-days: 30

  # Job 5: Security summary report
  security-summary:
    name: Generate Security Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, trivy-filesystem, trivy-docker, trivy-iac]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "**Scan Date**: $(date -u)" >> security-summary.md
          echo "**Branch**: ${{ github.ref_name }}" >> security-summary.md
          echo "**Commit**: ${{ github.sha }}" >> security-summary.md
          echo "" >> security-summary.md

          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "| Scan Type | Status |" >> security-summary.md
          echo "|-----------|--------|" >> security-summary.md
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> security-summary.md
          echo "| Trivy Filesystem | ${{ needs.trivy-filesystem.result }} |" >> security-summary.md
          echo "| Trivy Docker | ${{ needs.trivy-docker.result }} |" >> security-summary.md
          echo "| Trivy IaC | ${{ needs.trivy-iac.result }} |" >> security-summary.md
          echo "" >> security-summary.md

          echo "## Artifacts" >> security-summary.md
          echo "" >> security-summary.md
          echo "All scan results are available as workflow artifacts:" >> security-summary.md
          echo "- npm-audit-results" >> security-summary.md
          echo "- trivy-filesystem-results" >> security-summary.md
          echo "- trivy-docker-*-results" >> security-summary.md
          echo "- trivy-iac-results" >> security-summary.md
          echo "" >> security-summary.md

          echo "## View Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "- GitHub Security Tab: Repository > Security > Code scanning alerts" >> security-summary.md
          echo "- Workflow Artifacts: Actions > This workflow run > Artifacts section" >> security-summary.md

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 90

# Interview Talking Points:
#
# 1. Defense in Depth:
#    "We use multiple scanning tools (npm audit + Trivy) for defense in depth. npm audit
#    specializes in JavaScript dependencies, while Trivy covers OS packages, container
#    images, and IaC. This layered approach catches more vulnerabilities than a single tool."
#
# 2. Shift Left Security:
#    "Security scanning on every push and PR shifts security left in the SDLC. Developers
#    get immediate feedback, reducing the cost of fixing vulnerabilities by 100x compared
#    to finding them in production."
#
# 3. SARIF Integration:
#    "Uploading SARIF results to GitHub Security tab provides centralized vulnerability
#    management. Security teams can track remediation, set policies, and integrate with
#    tools like Dependabot for automated fixes."
#
# 4. Scheduled Scans:
#    "Daily scans detect newly disclosed CVEs in our dependencies. A vulnerability may
#    not exist when we last pushed code, but be disclosed the next day. Scheduled scans
#    ensure we're notified within 24 hours."
#
# 5. Fail vs Warn:
#    "We use exit-code: '0' (warn mode) rather than failing CI on vulnerabilities. This
#    balances security with development velocity. Critical vulnerabilities are tracked
#    in Security tab, and teams can remediate based on risk prioritization."
#
# 6. Matrix Strategy:
#    "We use matrix strategy to scan multiple Docker images in parallel. This scales
#    efficiently as we add more custom images (Cypress, Newman, etc.)."
#
# 7. Retention Policy:
#    "Security artifacts are retained for 30-90 days for compliance and audit trails.
#    This allows historical analysis and demonstrates security due diligence."
#
# 8. Trivy vs Competitors:
#    "We chose Trivy over alternatives (Snyk, Clair, Grype) because it's open-source,
#    fast (~1 minute scans), comprehensive (CVE databases from multiple sources), and
#    actively maintained by Aqua Security."
