name: PR Quick Checks (Node.js)

on:
  pull_request:
    branches: [main]
    paths:
      - 'cicd-demo/**'
      - '.github/workflows/pr-checks.yml'
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

defaults:
  run:
    working-directory: cicd-demo

jobs:
  validate:
    name: Environment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .nvmrc exists
        run: |
          if [ ! -f ".nvmrc" ]; then
            echo "::error::.nvmrc file is missing (ENV-001)"
            exit 1
          fi
          echo "Required Node.js: $(cat .nvmrc)"

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: 'cicd-demo/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'cicd-demo/package-lock.json'

      - name: Verify Node.js version matches .nvmrc
        run: |
          required=$(cat .nvmrc)
          current=$(node --version | sed 's/v//')
          if [ "$current" != "$required" ]; then
            echo "::error::Node.js version mismatch: required $required, got $current"
            exit 1
          fi

      - name: Validate package-lock.json in sync
        run: npm ci

      - name: Verify scripts are executable
        run: |
          for script in scripts/validate-environment.sh scripts/fix-permissions.sh; do
            if [ ! -x "$script" ]; then
              echo "::error::$script is not executable (PERM-001)"
              exit 1
            fi
          done

  quick-tests:
    name: Fast Tests (Node.js)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cicd-demo/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:cypress
        env:
          CYPRESS_baseUrl: https://jsonplaceholder.typicode.com

      - name: Run Newman tests
        run: npm run test:newman

      - name: Upload Cypress videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-pr
          path: cicd-demo/cypress/videos/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-pr
          path: cicd-demo/newman/
          if-no-files-found: warn
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: cicd-demo/newman/junit.xml
          check_name: PR Quick Test Results

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cicd-demo/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
