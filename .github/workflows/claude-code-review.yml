name: Claude Code Review

# 暂时禁用：用户套餐流量不足 (2026-04-27)
# 如需重新启用，请取消下面的注释并注释掉 workflow_dispatch
on:
  workflow_dispatch: # 手动触发（默认禁用自动运行）
  # pull_request:
  #   types: [opened, synchronize, ready_for_review, reopened]
  #   # 只对代码变更触发；故意排除 .github/workflows/ 下的 yml 文件：
  #   # 修改 workflow 文件的 PR 会导致 OIDC token 校验失败（运行中的 workflow
  #   # 与 main 分支内容不一致），排除后可完全避免该报错。
  #   paths:
  #     - "**/*.js"
  #     - "**/*.ts"
  #     - "**/*.py"
  #     - "**/*.json"

# 并发控制：同一 PR 有新 push 时，取消上一次未完成的运行
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # 跳过：Draft PR、dependabot[bot] 自动安全更新、以及 Copilot bot 自己触发的同步事件
    # 原因：Copilot actor 触发 anthropics/claude-code-action 的 OIDC app token exchange
    # 会返回 401 "User does not have write access on this repository"
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.actor != 'Copilot'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # 豁免说明（违反 CLAUDE.md 默认禁用 continue-on-error 规则的明确例外）：
        # 本步骤调用 Anthropic 第三方 SaaS（claude-code-action），失败原因常为
        # 外部不可控因素：① 组织月度 token 配额耗尽 ② 上游 action 内部 bun
        # 运行时告警 ③ Anthropic API 短时不可用。这些**不是仓库代码缺陷**，
        # 也无法被任何静态测试 / 单元测试预防。该 workflow 是 AI 辅助评审工具，
        # 不属于业务质量门，不应阻塞 PR 合入与刷红 PR Checks。因此显式允许
        # 本步骤失败而不影响 job 结论；真正的代码质量由 performance-ci /
        # api-testing-ci / repo-meta-ci 等必跑 CI 保障。
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
