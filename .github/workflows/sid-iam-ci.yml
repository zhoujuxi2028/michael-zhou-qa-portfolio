name: SID IAM CI

on:
  workflow_dispatch:
  push:
    branches: [main, feature/sid-iam-testing]
    paths:
      - '.github/workflows/sid-iam-ci.yml'
      - '.github/actions/setup-python-project/**'
      - 'sid-iam-testing-platform/src/**'
      - 'sid-iam-testing-platform/tests/**'
      - 'sid-iam-testing-platform/scripts/**'
      - 'sid-iam-testing-platform/requirements.txt'
      - 'sid-iam-testing-platform/pytest.ini'
      - 'sid-iam-testing-platform/pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/sid-iam-ci.yml'
      - '.github/actions/setup-python-project/**'
      - 'sid-iam-testing-platform/src/**'
      - 'sid-iam-testing-platform/tests/**'
      - 'sid-iam-testing-platform/scripts/**'
      - 'sid-iam-testing-platform/requirements.txt'
      - 'sid-iam-testing-platform/pytest.ini'
      - 'sid-iam-testing-platform/pyproject.toml'

permissions:
  contents: read

defaults:
  run:
    working-directory: sid-iam-testing-platform

jobs:
  code-quality:
    name: SID IAM / Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-project
        with:
          python-version: '3.11'
          working-directory: sid-iam-testing-platform
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

  unit-tests:
    name: SID IAM / Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-project
        with:
          python-version: '3.11'
          working-directory: sid-iam-testing-platform
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - name: Run unit tests (exclude integration)
        run: pytest tests/ -v -m "not integration" --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: sid-iam-testing-platform/coverage.xml

  integration-tests:
    name: SID IAM / Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-project
        with:
          python-version: '3.11'
          working-directory: sid-iam-testing-platform
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - name: Run integration tests
        run: pytest tests/ -v -m integration

  all-tests:
    name: SID IAM / Full Test Matrix
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-project
        with:
          python-version: '3.11'
          working-directory: sid-iam-testing-platform
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - name: Run all 138 tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing
      - name: Verify by priority
        run: |
          echo "=== P0 Critical (60 tests) ==="
          pytest tests/ -v -m P0 --tb=no -q
          echo "=== Security tests ==="
          pytest tests/ -v -m security --tb=no -q
