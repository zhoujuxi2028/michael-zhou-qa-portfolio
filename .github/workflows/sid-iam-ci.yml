name: SID IAM CI

on:
  workflow_dispatch:
  push:
    branches: [main, feature/sid-iam-testing]
    paths: ['sid-iam-testing-platform/**']
  pull_request:
    branches: [main]
    paths: ['sid-iam-testing-platform/**']

defaults:
  run:
    working-directory: sid-iam-testing-platform

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run unit tests (exclude integration)
        run: pytest tests/ -v -m "not integration" --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: sid-iam-testing-platform/coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run integration tests
        run: pytest tests/ -v -m integration

  all-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sid-iam-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run all 138 tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing
      - name: Verify by priority
        run: |
          echo "=== P0 Critical (60 tests) ==="
          pytest tests/ -v -m P0 --tb=no -q
          echo "=== Security tests ==="
          pytest tests/ -v -m security --tb=no -q
