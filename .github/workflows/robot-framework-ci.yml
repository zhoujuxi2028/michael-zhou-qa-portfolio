name: Robot Framework CI

on:
  push:
    branches: [main, 'feature/robot-framework*', 'copilot/pabot*']
    paths:
      - 'robot-framework-demo/**'
      - '.github/workflows/robot-framework-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'robot-framework-demo/**'
      - '.github/workflows/robot-framework-ci.yml'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Robot Framework / Pabot Parallel Tests
    runs-on: ubuntu-latest

    services:
      selenium-hub:
        image: selenium/hub:4.21.0
        ports:
          - 4444:4444
      chrome-node:
        image: selenium/node-chrome:4.21.0
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 3
        options: >-
          --shm-size 2g
      firefox-node:
        image: selenium/node-firefox:4.21.0
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 3
        options: >-
          --shm-size 2g

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: robot-framework-demo/requirements.txt

      - name: Install dependencies
        run: |
          cd robot-framework-demo
          pip install -r requirements.txt

      - name: Wait for Selenium Grid
        run: |
          echo "等待 Selenium Grid 启动..."
          max_attempts=60
          attempt=0
          
          # 函数：检查 Grid 就绪状态
          check_grid_ready() {
            local endpoints=(
              "http://localhost:4444/wd/hub/status"
              "http://localhost:4444/status"
              "http://localhost:4444/grid/api/hub/health"
            )
            
            for endpoint in "${endpoints[@]}"; do
              response=$(curl -s --max-time 3 --connect-timeout 2 \
                -w "\n%{http_code}" \
                "$endpoint" 2>/dev/null || echo "")
              
              if [ -z "$response" ]; then
                continue
              fi
              
              http_code=$(echo "$response" | tail -n 1)
              body=$(echo "$response" | head -n -1)
              
              # 检查 HTTP 状态码
              if [ "$http_code" = "200" ]; then
                # 检查响应是否包含 ready 字段（各种格式）
                if echo "$body" | grep -qE '"ready"\s*:\s*true|"status"\s*:\s*"UP"|"value"\s*:\s*true'; then
                  return 0
                fi
              fi
            done
            return 1
          }
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            
            if check_grid_ready; then
              echo "✓ Selenium Grid 就绪 (尝试 $attempt)"
              exit 0
            fi
            
            echo "尝试 $attempt/$max_attempts: 等待 Selenium Grid..."
            if [ $attempt -lt $max_attempts ]; then
              sleep 1
            fi
          done
          
          echo "错误: Selenium Grid 启动超时 (已等待 ${max_attempts} 秒)"
          echo ""
          echo "调试信息:"
          echo "尝试连接到各个端点:"
          curl -v http://localhost:4444/wd/hub/status 2>&1 | head -20 || echo "  /wd/hub/status: 连接失败"
          curl -v http://localhost:4444/status 2>&1 | head -20 || echo "  /status: 连接失败"
          curl -v http://localhost:4444/grid/api/hub/health 2>&1 | head -20 || echo "  /grid/api/hub/health: 连接失败"
          exit 1

      - name: Run tests with Pabot (parallel)
        run: |
          cd robot-framework-demo
          pabot --processes 2 \
            --outputdir results \
            --variable SELENIUM_GRID:http://localhost:4444/wd/hub \
            --include smoke \
            tests/

      - name: Merge reports with Rebot
        if: always()
        run: |
          cd robot-framework-demo
          rebot --outputdir results/merged \
            --name "CI 并行测试合并报告" \
            --merge \
            results/output.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: robot-results
          path: robot-framework-demo/results/
          retention-days: 14
