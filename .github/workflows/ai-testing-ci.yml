name: AI Testing CI

on:
  workflow_dispatch:
  push:
    branches: [main, "feature/*", "copilot/*"]
    paths: ['ai-testing-platform/**']
  pull_request:
    branches: [main]
    paths: ['ai-testing-platform/**']

permissions:
  contents: read

defaults:
  run:
    working-directory: ai-testing-platform

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff format --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run all tests with coverage (skip LLM-dependent)
        run: pytest tests/ -v -m "not llm" --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ai-testing-platform/coverage.xml

  verify-by-module:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: TestCaseGenerator tests
        run: pytest tests/test_case_generator/ -v -m "generation" --tb=short
      - name: DefectPredictor tests
        run: pytest tests/test_defect_predictor/ -v -m "prediction" --tb=short
      - name: ScriptGenerator tests
        run: pytest tests/test_script_generator/ -v -m "script_gen" --tb=short
      - name: LLMEvaluator unit tests
        run: pytest tests/test_llm_evaluator/ -v -m "not llm" --tb=short
      - name: P0 critical tests
        run: pytest tests/ -v -m P0 --tb=short -q
