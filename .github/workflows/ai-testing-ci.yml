name: AI Testing Platform CI

on:
  workflow_dispatch:
  push:
    branches: [main, "feature/*", "copilot/*"]
    paths: ['ai-testing-platform/**']
  pull_request:
    branches: [main]
    paths: ['ai-testing-platform/**']

defaults:
  run:
    working-directory: ai-testing-platform

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run all 43 tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-testing-platform/coverage.xml

  verify-by-module:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-testing-platform/requirements.txt
      - run: pip install -r requirements.txt
      - name: TestCaseGenerator tests (14)
        run: pytest tests/test_case_generator/ -v -m "generation" --tb=short
      - name: DefectPredictor tests (13)
        run: pytest tests/test_defect_predictor/ -v -m "prediction" --tb=short
      - name: ScriptGenerator tests (16)
        run: pytest tests/test_script_generator/ -v -m "script_gen" --tb=short
      - name: P0 critical tests
        run: pytest tests/ -v -m P0 --tb=short -q
