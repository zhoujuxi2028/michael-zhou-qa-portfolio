name: CICD Demo / Terraform CI

# PR 阶段对 Terraform 代码做格式、语法与安全检查。
# 分层职责：
#   cicd-demo-terraform.yml  — Terraform fmt / validate / IaC security（本文件）
#   cicd-demo-pr.yml         — K8s YAML / Helm / Docker / JS lint（其他资源）
#   security-scan.yml        — 深度 Trivy 全量扫描 + SARIF 上传（夜间/合并后）

on:
  pull_request:
    branches: [main]
    paths:
      - 'cicd-demo/terraform/**'
      - '.github/workflows/cicd-demo-terraform.yml'
  workflow_dispatch:

concurrency:
  group: cicd-demo-terraform-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: cicd-demo/terraform

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Fmt —— terraform fmt -check（格式一致性校验）
  # ---------------------------------------------------------------------------
  fmt:
    name: CICD Demo / Terraform Fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '~1.7'

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive -diff

  # ---------------------------------------------------------------------------
  # Job 2: Validate —— terraform validate（语法与配置校验）
  # ---------------------------------------------------------------------------
  validate:
    name: CICD Demo / Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '~1.7'

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Job 3: Security —— Trivy 扫描 Terraform IaC 配置（HIGH/CRITICAL 失败）
  # ---------------------------------------------------------------------------
  security:
    name: CICD Demo / Terraform Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 覆盖 defaults.run.working-directory，Trivy scan-ref 使用相对路径时需在仓库根执行
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trivy IaC scan (Terraform — HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'cicd-demo/terraform'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
          trivyignores: 'cicd-demo/.trivyignore'

  # ---------------------------------------------------------------------------
  # Job 4: Terraform Gate —— 汇总闸口（Branch Protection Required Check）
  # ---------------------------------------------------------------------------
  tf-gate:
    name: CICD Demo / Terraform Gate
    runs-on: ubuntu-latest
    needs: [fmt, validate, security]
    if: always()
    timeout-minutes: 2
    defaults:
      run:
        working-directory: .
    steps:
      - name: Aggregate Terraform check results
        shell: bash
        run: |
          set -euo pipefail
          echo "Fmt:      ${{ needs.fmt.result }}"
          echo "Validate: ${{ needs.validate.result }}"
          echo "Security: ${{ needs.security.result }}"

          for result in \
            "${{ needs.fmt.result }}" \
            "${{ needs.validate.result }}" \
            "${{ needs.security.result }}"; do
            if [ "$result" != "success" ]; then
              echo "::error::Terraform gate failed — one or more checks did not succeed."
              exit 1
            fi
          done
          echo "✅ All Terraform CI checks passed."
