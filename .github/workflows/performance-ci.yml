name: Performance Testing CI

on:
  push:
    branches: [main, feature/performance-testing]
    paths:
      - 'performance-testing-platform/**'
      - '.github/workflows/performance-ci.yml'
  pull_request:
    branches: [main, feature/performance-testing]
    paths:
      - 'performance-testing-platform/**'
      - '.github/workflows/performance-ci.yml'
  workflow_dispatch:

concurrency:
  group: performance-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: performance-testing-platform

jobs:
  performance-lint:
    name: Performance Testing / Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Code Style (ESLint + Prettier)
        # 合并 lint 与 format:check：两者都执行后再统一退出，避免一项失败遮蔽另一项
        # （GitHub Actions 默认 fail-fast：拆成两个 step 时，前者红灯后者就不再跑，
        #  无法一次拿到所有 Code Style 全貌。历史问题见 PR #218 / RCA-2026-04-26。）
        run: |
          set +e
          npm run lint
          LINT_STATUS=$?
          npm run format:check
          FORMAT_STATUS=$?
          echo "ESLint exit: $LINT_STATUS, Prettier exit: $FORMAT_STATUS"
          if [ "$LINT_STATUS" -ne 0 ] || [ "$FORMAT_STATUS" -ne 0 ]; then
            exit 1
          fi
      - name: ShellCheck
        run: find scripts/ -name "*.sh" -print0 | xargs -0 shellcheck --severity=warning

  unit-tests:
    name: Performance Testing / Unit Tests
    runs-on: ubuntu-latest
    # 优化 #2：lint 不再阻塞测试 job，与 lint 并行运行；最终由 performance-gate 汇总
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      # test:coverage 已移除 --runInBand，使用 jest.config.js 配置的 maxWorkers: 50%
      # CI runner 4 核 → 2 worker 并行，预期比单线程提速约 30~40%
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: performance-testing-platform/coverage/

  shell-tests-fast:
    name: Performance Testing / Shell Tests (Fast)
    runs-on: ubuntu-latest
    # 优化 #2：与 lint 并行
    steps:
      - uses: actions/checkout@v6
        with:
          # 9.2 conventional commits 检查需要近期提交历史；50 已足够（替代旧 fetch-depth: 0）
          fetch-depth: 50
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.10.0
      - name: Run fast BATS shell tests
        run: bats tests/unit/scripts/stage4-selftest-fast.bats

  shell-tests-integration:
    name: Performance Testing / Shell Tests (Integration)
    runs-on: ubuntu-latest
    # 优化 #2：与 lint 并行；不被下游 smoke/jmeter job 依赖，因此天然不阻塞性能闸门关键路径
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.10.0
      - name: Run integration BATS shell tests
        run: bats tests/unit/scripts/stage4-selftest-integration.bats

  jmeter-smoke-test:
    # 优化 #1：合并原 jmeter-dryrun + jmeter-smoke-test 两个 job，
    # 共享 setup-java / JMeter 缓存 / API 启动，关键路径节省约 40s。
    # dryrun 作为 smoke 之前的 step，保留早失败语义（dryrun 失败则不进入 smoke）。
    name: Performance Testing / JMeter Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, shell-tests-fast]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: performance-testing-platform/apache-jmeter-5.6.3
          key: jmeter-5.6.3
      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          rm -f apache-jmeter-5.6.3.tgz
      - name: Add JMeter to PATH
        run: echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH
      - name: Start target API
        run: node src/server.js &
      - name: Wait for API
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
      - name: Run JMeter dry run (performance gate)
        run: npm run jmeter:dryrun
      - name: Run JMeter smoke test (performance gate)
        run: |
          mkdir -p results
          jmeter -n -t tests/jmeter/smoke.jmx -q tests/jmeter/config/smoke.properties -l results/jmeter-smoke.jtl
      - name: Check JMeter results (fail on errors + latency)
        run: |
          ERROR_COUNT=$(tail -n +2 results/jmeter-smoke.jtl | awk -F',' '{if($8=="false") count++} END{print count+0}')
          TOTAL_COUNT=$(tail -n +2 results/jmeter-smoke.jtl | wc -l | tr -d ' ')
          echo "Errors: $ERROR_COUNT / Total: $TOTAL_COUNT"
          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "FAIL: No test results found"
            exit 1
          fi
          ERROR_RATE=$(echo "scale=4; $ERROR_COUNT / $TOTAL_COUNT * 100" | bc)
          echo "Error rate: ${ERROR_RATE}%"
          if [ "$(echo "$ERROR_RATE >= 1.0" | bc)" -eq 1 ]; then
            echo "FAIL: Error rate >= 1% threshold"
            exit 1
          fi

          # p95 latency check (aligned with k6 SLA: p95 < 500ms)
          # JMeter CSV 默认格式: column 2 = elapsed time (ms)
          P95=$(tail -n +2 results/jmeter-smoke.jtl | awk -F',' '{print $2}' | sort -n | awk 'BEGIN{c=0} {a[c++]=$1} END{print a[int(c*0.95)]}')
          echo "p95 latency: ${P95}ms"
          if [ "$(echo "$P95 >= 500" | bc)" -eq 1 ]; then
            echo "FAIL: p95 latency (${P95}ms) >= 500ms threshold"
            exit 1
          fi
      - name: Stop API
        if: always()
        run: kill $(lsof -ti:3000) 2>/dev/null || true
      - name: Upload JMeter results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jmeter-smoke-results
          path: performance-testing-platform/results/

  smoke-test:
    name: Performance Testing / k6 Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, shell-tests-fast]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Install k6
        run: |
          curl -sSL https://github.com/grafana/k6/releases/download/v1.7.0/k6-v1.7.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v1.7.0-linux-amd64/k6 /usr/local/bin/
          k6 version
      - name: Start target API
        run: node src/server.js &
      - name: Wait for API
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
      - name: Run k6 smoke test (performance gate)
        run: |
          mkdir -p reports
          k6 run --out json=reports/k6-smoke-summary.json tests/performance/smoke.k6.js
      - name: Extract baseline metrics
        run: node scripts/analysis/baseline-export.js
      - name: Stop API
        if: always()
        run: kill $(lsof -ti:3000) 2>/dev/null || true

  baseline-compare:
    name: Performance Testing / Baseline Compare
    runs-on: ubuntu-latest
    needs: [smoke-test, jmeter-smoke-test]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Download previous baseline artifact (CI-BL-04 first-run handling)
        id: download_baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # R-27 兜底逻辑显式化：首次运行或 artifact 缺失时显式 exit 0，
        # 不再依赖 `continue-on-error: true` 掩盖潜在错误。
        # 非首次运行但下载失败会让 job 红灯，便于发现真实故障。
        run: |
          set -euo pipefail
          mkdir -p reports
          GH_DL_ERR_LOG="${RUNNER_TEMP:-/tmp}/gh_dl_err.log"
          # 注意：`|| true` 仅作用于 `head -1`，保留 `gh run list` 真实失败的传播
          RUN_ID=$(gh run list -w performance-ci.yml \
            --json conclusion,databaseId \
            -q '.[] | select(.conclusion=="success") | .databaseId' \
            | { head -1 || true; })
          if [ -z "${RUN_ID:-}" ]; then
            echo "::notice::No previous successful run found — first run, baseline-compare will skip (CI-BL-04)"
            exit 0
          fi
          if ! gh run download "$RUN_ID" -n baseline-artifact -D reports/ 2>"$GH_DL_ERR_LOG"; then
            echo "::warning::Previous baseline artifact missing for run $RUN_ID"
            cat "$GH_DL_ERR_LOG" || true
            echo "::notice::Treating as first run — baseline-compare will skip comparison"
            exit 0
          fi
          echo "✅ Previous baseline artifact downloaded from run $RUN_ID"
      - name: Compare baseline (CI-BASE-02)
        run: node scripts/analysis/baseline-compare.js
      - name: Upload comparison result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: baseline-comparison
          path: |
            performance-testing-platform/reports/baseline.json
            performance-testing-platform/reports/comparison-result.json
      - name: Comment baseline regression on PR (PERF-CI-BL-FR-002)
        # 仅在 PR 事件且 comparison-result.json 报告 WARNING/FAIL 时发布 sticky 评论。
        # marker: <!-- perf-baseline-comment --> (与 trend 评论解耦)
        # 设计依据: docs/devops/phase7-gap-remediation-design.md §3.3
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = 'performance-testing-platform/reports/comparison-result.json';
            if (!fs.existsSync(resultPath)) {
              core.info('No comparison-result.json (first run), skipping baseline PR comment');
              return;
            }
            let result;
            try {
              result = JSON.parse(fs.readFileSync(resultPath, 'utf-8'));
            } catch (e) {
              core.warning(`Failed to parse comparison-result.json: ${e.message}`);
              return;
            }
            if (!result || !result.status || result.status === 'PASS') {
              core.info(`Baseline status=${result && result.status}, no comment needed`);
              return;
            }
            const deltaPct = result.delta != null
              ? `${(result.delta * 100).toFixed(1)}%`
              : 'n/a';
            const icon = result.status === 'FAIL' ? '❌' : '⚠️';
            const headline = result.status === 'FAIL'
              ? '基线回归 FAIL — p95 退化超过 50% 阈值,CI 已阻塞'
              : '基线回归 WARNING — p95 退化超过 20% 阈值,请关注';
            const marker = '<!-- perf-baseline-comment -->';
            const body = [
              marker,
              `## ${icon} Performance Baseline Regression`,
              '',
              headline,
              '',
              `- **Status**: \`${result.status}\``,
              `- **p95 delta**: ${deltaPct}`,
              '',
              '查看完整对比: Actions → baseline-comparison artifact',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
              core.info(`Updated baseline regression comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info('Created new baseline regression comment');
            }

  trend-collect:
    name: Performance Testing / Trend Collect
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-project
        with:
          node-version: '18'
          working-directory: performance-testing-platform
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Collect trend data + generate trend.md (CI-TREND-01, TREND-01, PERF-CI-BL-FR-007)
        run: |
          mkdir -p reports
          node scripts/analysis/trend-collect.js
      - name: Upload trend artifact (PERF-CI-BL-FR-003/004)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trend-data
          path: |
            performance-testing-platform/reports/trend.json
            performance-testing-platform/reports/trend.md
          retention-days: 90
      - name: Comment trend on PR (CI-TREND-COMMENT, PERF-CI-BL-FR-008)
        # Sticky comment：每次推送更新同一条评论（通过 marker 识别）。
        # 仅在 PR 事件且 trend.md 存在时执行；fork PR 因为缺少 pull-requests:write 权限会跳过。
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'performance-testing-platform/reports/trend.md';
            if (!fs.existsSync(reportPath)) {
              core.info('No trend.md generated, skipping PR comment');
              return;
            }
            const trendBody = fs.readFileSync(reportPath, 'utf-8');
            const marker = '<!-- perf-trend-comment -->';
            const body = `${marker}\n## 📈 Performance Trend\n\n${trendBody}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
              core.info(`Updated trend comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info('Created new trend comment');
            }

  performance-gate:
    # 优化 #4：汇总 job，作为 branch protection 唯一 required check。
    # 任意一个上游 job 失败/取消则本 job 失败，避免后续重构 job 名称时频繁改保护规则。
    # 详见 root CLAUDE.md "修改 check 名称要同步清理 required checks" 历史教训。
    name: Performance Testing / Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - performance-lint
      - unit-tests
      - shell-tests-fast
      - shell-tests-integration
      - jmeter-smoke-test
      - smoke-test
      - baseline-compare
      - trend-collect
    steps:
      - name: Verify all upstream jobs succeeded
        # gate job 不 checkout，覆盖 workflow 级 working-directory，避免目录不存在导致 bash 启动失败
        working-directory: .
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq .
          if echo "$NEEDS_JSON" | jq -e 'all(.[]; .result == "success")' > /dev/null; then
            echo "✅ All upstream jobs succeeded"
          else
            echo "::error::One or more upstream jobs did not succeed"
            echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success") | "❌ \(.key): \(.value.result)"'
            exit 1
          fi
