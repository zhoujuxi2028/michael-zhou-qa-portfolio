name: Performance Testing CI

on:
  push:
    branches: [main, feature/performance-testing]
    paths:
      - 'performance-testing-platform/**'
      - '.github/workflows/performance-ci.yml'
  pull_request:
    branches: [main, feature/performance-testing]
    paths:
      - 'performance-testing-platform/**'
      - '.github/workflows/performance-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: performance-testing-platform

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: performance-testing-platform/package-lock.json
      - run: npm ci
      - run: npx eslint src/ tests/unit/ --ext .js
      - run: npx prettier --check 'src/**/*.js' 'tests/**/*.js' 'scripts/**/*.js'

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: performance-testing-platform/package-lock.json
      - run: npm ci
      - run: npx jest tests/unit/ --coverage --coverageReporters=text --coverageReporters=lcov
      - name: Check coverage thresholds
        run: |
          COVERAGE_FILE=performance-testing-platform/coverage/lcov-report/index.html
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "FAIL: Coverage report not found"
            exit 1
          fi

          # Extract coverage percentages
          Statements=$(grep -o 'All files[^>]*> \([0-9.]*\)%' "$COVERAGE_FILE" | sed 's/.*> \([0-9.]*\)%/\1/')
          Branches=$(grep -o 'All files[^>]*> \([0-9.]*\)%' "$COVERAGE_FILE" | sed 's/.*> \([0-9.]*\)%/\1/' | tail -1)
          Functions=$(grep -o 'All files[^>]*> \([0-9.]*\)%' "$COVERAGE_FILE" | sed 's/.*> \([0-9.]*\)%/\1/' | tail -1)
          Lines=$(grep -o 'All files[^>]*> \([0-9.]*\)%' "$COVERAGE_FILE" | sed 's/.*> \([0-9.]*\)%/\1/' | tail -1)

          echo "Statements: ${Statements}%"
          echo "Branches: ${Branches}%"
          echo "Functions: ${Functions}%"
          echo "Lines: ${Lines}%"

          # Check thresholds (CI-COV-01)
          if (( $(echo "$Statements < 80" | bc -l) )); then
            echo "FAIL: Statements coverage (${Statements}%) < 80% threshold"
            exit 1
          fi
          if (( $(echo "$Branches < 70" | bc -l) )); then
            echo "FAIL: Branches coverage (${Branches}%) < 70% threshold"
            exit 1
          fi
          if (( $(echo "$Functions < 80" | bc -l) )); then
            echo "FAIL: Functions coverage (${Functions}%) < 80% threshold"
            exit 1
          fi
          if (( $(echo "$Lines < 80" | bc -l) )); then
            echo "FAIL: Lines coverage (${Lines}%) < 80% threshold"
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: performance-testing-platform/coverage/

  smoke-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: performance-testing-platform/package-lock.json
      - name: Install k6
        run: |
          curl -sSL https://github.com/grafana/k6/releases/download/v1.7.0/k6-v1.7.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v1.7.0-linux-amd64/k6 /usr/local/bin/
          k6 version
      - run: npm ci
      - name: Start target API
        run: node src/server.js &
      - name: Wait for API
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
      - name: Run k6 smoke test (performance gate)
        run: k6 run --out json=reports/k6-smoke-summary.json tests/performance/smoke.k6.js
      - name: Extract baseline metrics
        run: node scripts/baseline-export.js
      - name: Stop API
        if: always()
        run: kill $(lsof -ti:3000) 2>/dev/null || true

  jmeter-smoke-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: performance-testing-platform/package-lock.json
      - run: npm ci
      - name: Install JMeter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jre > /dev/null
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH
      - name: Start target API
        run: node src/server.js &
      - name: Wait for API
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
      - name: Run JMeter smoke test (performance gate)
        run: |
          mkdir -p results
          jmeter -n -t tests/jmeter/smoke.jmx -q tests/jmeter/config/smoke.properties -l results/jmeter-smoke.jtl
      - name: Check JMeter results (fail on errors + latency)
        run: |
          ERROR_COUNT=$(tail -n +2 results/jmeter-smoke.jtl | awk -F',' '{if($8=="false") count++} END{print count+0}')
          TOTAL_COUNT=$(tail -n +2 results/jmeter-smoke.jtl | wc -l | tr -d ' ')
          echo "Errors: $ERROR_COUNT / Total: $TOTAL_COUNT"
          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "FAIL: No test results found"
            exit 1
          fi
          ERROR_RATE=$(echo "scale=4; $ERROR_COUNT / $TOTAL_COUNT * 100" | bc)
          echo "Error rate: ${ERROR_RATE}%"
          if [ "$(echo "$ERROR_RATE >= 1.0" | bc)" -eq 1 ]; then
            echo "FAIL: Error rate >= 1% threshold"
            exit 1
          fi

          # p95 latency check (aligned with k6 SLA: p95 < 500ms)
          # JMeter CSV 默认格式: column 2 = elapsed time (ms)
          P95=$(tail -n +2 results/jmeter-smoke.jtl | awk -F',' '{print $2}' | sort -n | awk 'BEGIN{c=0} {a[c++]=$1} END{print a[int(c*0.95)]}')
          echo "p95 latency: ${P95}ms"
          if [ "$(echo "$P95 >= 500" | bc)" -eq 1 ]; then
            echo "FAIL: p95 latency (${P95}ms) >= 500ms threshold"
            exit 1
          fi
      - name: Stop API
        if: always()
        run: kill $(lsof -ti:3000) 2>/dev/null || true
      - name: Upload JMeter results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jmeter-smoke-results
          path: performance-testing-platform/results/

  baseline-compare:
    runs-on: ubuntu-latest
    needs: [smoke-test, jmeter-smoke-test]
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - run: npm ci
      - name: Download baseline artifact
        # 首次运行无 baseline artifact 时允许失败（已知 exemption，见 risks.md R-27）
        continue-on-error: true
        run: |
          gh run list -w performance-ci.yml --json conclusion,databaseId -q '.[] | select(.conclusion=="success") | .databaseId' | head -1 | xargs -I {} gh run download {} -n baseline-artifact -D reports/
      - name: Compare baseline (CI-BASE-02)
        run: node scripts/baseline-compare.js
      - name: Upload comparison result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: baseline-comparison
          path: |
            performance-testing-platform/reports/baseline.json
            performance-testing-platform/reports/comparison-result.json

  trend-collect:
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - run: npm ci
      - name: Collect trend data (CI-TREND-01)
        run: node scripts/trend-collect.js
      - name: Upload trend artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trend-data
          path: performance-testing-platform/reports/trend.json
