name: Security Tests

on:
  push:
    branches: [main, feature/security-testing]
    paths:
      - 'security-testing-demo/**'
  pull_request:
    branches: [main]
    paths:
      - 'security-testing-demo/**'
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  security-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 80:80

    env:
      DVWA_URL: http://localhost
      TARGET_URL: http://localhost

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for DVWA
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:80 > /dev/null; then
              echo "DVWA is ready"
              break
            fi
            echo "Waiting for DVWA..."
            sleep 2
          done

      - name: Initialize DVWA database
        run: python scripts/init_dvwa.py

      - name: Run security tests
        run: |
          mkdir -p reports
          pytest tests/ -v \
            --ignore=tests/test_zap_scan.py \
            --ignore=tests/test_nessus_scan.py \
            --ignore=tests/test_openvas_scan.py \
            -m "not zap and not nessus and not openvas" \
            --tb=short \
            --junitxml=reports/security-tests.xml \
            --html=reports/test-report.html \
            --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-report
          path: |
            security-testing-demo/reports/test-report.html
            security-testing-demo/reports/security-tests.xml

  juice-shop-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    env:
      JUICE_SHOP_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Juice Shop
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready"
              break
            fi
            echo "Waiting for Juice Shop..."
            sleep 2
          done

      - name: Run Juice Shop tests
        run: |
          mkdir -p reports
          pytest tests/test_juice_shop_api.py tests/test_jwt.py \
            tests/test_nosql_injection.py tests/test_business_logic.py \
            tests/test_ssrf.py \
            -v --tb=short \
            --junitxml=reports/juice-shop-tests.xml \
            --html=reports/juice-shop-report.html \
            --self-contained-html

      - name: Upload Juice Shop report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: juice-shop-test-report
          path: |
            security-testing-demo/reports/juice-shop-report.html
            security-testing-demo/reports/juice-shop-tests.xml

  zap-baseline-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 80:80

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for DVWA to start
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:80 > /dev/null; then
              echo "DVWA is ready"
              break
            fi
            echo "Waiting for DVWA..."
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:80'
          rules_file_name: 'security-testing-demo/.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html

  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-testing-demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Run dependency vulnerability scan
        run: |
          pip install -r requirements.txt
          mkdir -p reports
          safety check --json > reports/dependency-scan.json || true
          cat reports/dependency-scan.json

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-report
          path: security-testing-demo/reports/dependency-scan.json

  summary:
    needs: [security-tests, juice-shop-tests, zap-baseline-scan, dependency-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Security Test Summary
        run: |
          echo "## Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Job status table
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests (DVWA + Phase 7) | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Juice Shop Tests | ${{ needs.juice-shop-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP Baseline Scan | ${{ needs.zap-baseline-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse JUnit XML for test counts
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Tests | Passed | Failed | Skipped | Errors |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|--------|--------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for report in artifacts/security-test-report/reports/security-tests.xml artifacts/juice-shop-test-report/reports/juice-shop-tests.xml; do
            if [ -f "$report" ]; then
              name=$(basename "$report" .xml | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              tests=$(grep -oP 'tests="\K[^"]+' "$report" | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' "$report" | head -1)
              skipped=$(grep -oP 'skipped="\K[^"]+' "$report" | head -1)
              errors=$(grep -oP 'errors="\K[^"]+' "$report" | head -1)
              passed=$((${tests:-0} - ${failures:-0} - ${skipped:-0} - ${errors:-0}))
              echo "| ${name} | ${tests:-N/A} | ${passed} | ${failures:-0} | ${skipped:-0} | ${errors:-0} |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # OWASP Top 10 coverage
          echo "### OWASP Top 10 2021 Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| ID | Category | Test Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|----|----------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| A01 | Broken Access Control | test_auth, test_csrf, test_juice_shop_api |" >> $GITHUB_STEP_SUMMARY
          echo "| A02 | Cryptographic Failures | test_crypto |" >> $GITHUB_STEP_SUMMARY
          echo "| A03 | Injection | test_xss, test_sqli, test_nosql_injection, test_sqlmap |" >> $GITHUB_STEP_SUMMARY
          echo "| A04 | Insecure Design | test_business_logic |" >> $GITHUB_STEP_SUMMARY
          echo "| A05 | Security Misconfiguration | test_headers |" >> $GITHUB_STEP_SUMMARY
          echo "| A06 | Vulnerable Components | test_components |" >> $GITHUB_STEP_SUMMARY
          echo "| A07 | Identification Failures | test_auth, test_jwt |" >> $GITHUB_STEP_SUMMARY
          echo "| A08 | Software Integrity | test_integrity |" >> $GITHUB_STEP_SUMMARY
          echo "| A09 | Logging Failures | test_logging |" >> $GITHUB_STEP_SUMMARY
          echo "| A10 | SSRF | test_ssrf |" >> $GITHUB_STEP_SUMMARY
