name: API Testing CI

on:
  push:
    branches: [main]
    paths:
      - 'api-testing-demo/**'
      - '.github/workflows/api-testing-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api-testing-demo/**'
      - '.github/workflows/api-testing-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: api-testing-demo

jobs:
  validate:
    name: Validate Collections
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: api-testing-demo/package-lock.json
      - run: npm ci
      - run: npm run validate

  api-tests:
    name: API Tests (Newman)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: api-testing-demo/package-lock.json
      - run: npm ci

      - name: Reset database
        run: git checkout db.json

      - name: Start json-server
        run: npm run server:test &

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3001 > /dev/null && break
            sleep 1
          done

      - name: Run Newman tests
        run: npm test

      - name: Verify assertion counts
        run: |
          REPORT="reports/newman-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: Newman JSON report not found at $REPORT"
            exit 1
          fi
          TOTAL=$(jq '[.run.executions[].assertions // [] | length] | add // 0' "$REPORT")
          FAILURES=$(jq '[.run.executions[].assertions // [] | map(select(.error)) | length] | add // 0' "$REPORT")
          echo "Assertions: total=$TOTAL, failures=$FAILURES"
          if [ "$TOTAL" -eq 0 ]; then
            echo "ERROR: No assertions found — tests may have been skipped"
            exit 1
          fi
          if [ "$FAILURES" -ne 0 ]; then
            echo "ERROR: $FAILURES assertion(s) failed"
            exit 1
          fi
          echo "OK: All $TOTAL assertions passed"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: newman-reports
          path: api-testing-demo/reports/
          retention-days: 14
