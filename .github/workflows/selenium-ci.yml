name: Selenium CI

on:
  push:
    branches: [main]
    paths:
      - 'selenium-demo/**'
      - '.github/workflows/selenium-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'selenium-demo/**'
      - '.github/workflows/selenium-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: selenium-demo

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: black --check src/ tests/  # line-length=100 from pyproject.toml
      - run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203

  smoke-tests:
    name: Smoke Tests (Headless Chrome)
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVEOF'
          BASE_URL=https://example.com
          USERNAME=admin
          PASSWORD=test123
          HEADLESS=true
          BROWSER=chrome
          BROWSER_WIDTH=1920
          BROWSER_HEIGHT=1080
          LOG_LEVEL=INFO
          TEST_ENV=ci
          ENABLE_VIDEO=false
          MAX_RETRIES=1
          RETRY_DELAY=1
          ENVEOF

      - name: Run smoke tests
        # Smoke test: continue-on-error at job level allows visibility without blocking
        env:
          PYTHONPATH: src
        run: >
          pytest tests/smoke/ -v
          -o "addopts="
          --confcutdir=tests/smoke
          --tb=short
          --timeout=30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-logs
          path: selenium-demo/outputs/
          retention-days: 14
