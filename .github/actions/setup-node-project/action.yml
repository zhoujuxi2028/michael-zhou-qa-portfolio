name: Setup Node.js project
description: 统一安装 Node.js、配置 npm cache，并执行项目依赖安装

inputs:
  node-version:
    description: Node.js 版本
    required: false
    default: '18'
  cache-dependency-path:
    description: package-lock.json 路径
    required: true
  working-directory:
    description: 项目工作目录
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        npm ci || (echo "::warning::npm ci failed - lockfile out of sync; running npm install as fallback (PDEF-008)" && npm install)
