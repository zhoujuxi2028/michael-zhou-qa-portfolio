# ============================================================================
# CI Workflow Template — Standard defaults for new workflows
# ============================================================================
# Copy this file to .github/workflows/<project>-ci.yml and customize.
#
# Standard defaults (from postmortem issues #38, #41):
#   - workflow_dispatch always included
#   - NO continue-on-error on test/lint/security steps
#   - NO environment: unless real deployment exists
#   - Reuse local composite actions for Node.js / Python setup
#   - Artifact upload with v7+
# ============================================================================

name: <Project> CI

on:
  workflow_dispatch:          # Always include — enables manual trigger
  push:
    branches: [main, 'feature/<branch>']
    paths: ['<project>/**']
  pull_request:
    branches: [main]
    paths: ['<project>/**']

defaults:
  run:
    working-directory: <project>

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      # --- Node.js projects ---
      # - uses: ./.github/actions/setup-node-project
      #   with:
      #     node-version: '22'
      #     # 这里始终传 '<project>'；composite action 内的 run step 不依赖 workflow defaults.run.working-directory
      #     working-directory: <project>
      #     cache-dependency-path: <project>/package-lock.json
      # - run: npx eslint .

      # --- Python projects ---
      # - uses: ./.github/actions/setup-python-project
      #   with:
      #     python-version: '3.11'
      #     # 这里始终传 '<project>'；composite action 内的 run step 不依赖 workflow defaults.run.working-directory
      #     working-directory: <project>
      #     cache-dependency-path: <project>/requirements.txt
      # - run: black --check src/ tests/
      # - run: isort --check-only src/ tests/
      # - run: flake8 src/ tests/ --max-line-length=120

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      # - uses: ./.github/actions/setup-node-project
      #   with:
      #     node-version: '22'
      #     # 这里始终传 '<project>'；composite action 内的 run step 不依赖 workflow defaults.run.working-directory
      #     working-directory: <project>
      #     cache-dependency-path: <project>/package-lock.json
      # - run: npm test          # Do NOT add continue-on-error: true

      # --- Upload artifacts (always, for debugging failed runs) ---
